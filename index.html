<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeoResus Master Pro - Alta Fidelidad</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #020617; color: #f8fafc; overflow-x: hidden; }
        .monitor-font { font-family: 'JetBrains Mono', monospace; }

        @keyframes pulse-border { 0%, 100% { opacity: 1; border-color: #ef4444; } 50% { opacity: 0.5; border-color: #7f1d1d; } }
        .pulse-red { animation: pulse-border 1s infinite; }

        .wave-container { height: 44px; width: 100%; overflow: hidden; position: relative; margin-top: 6px; }

        input[type=range] { -webkit-appearance: none; background: transparent; width: 100%; }
        input[type=range]::-webkit-slider-runnable-track { height: 6px; background: #1e293b; border-radius: 10px; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 18px; width: 18px; border-radius: 50%; background: #3b82f6; cursor: pointer; margin-top: -6px; border: 2px solid #fff; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        .setup-tool { filter: grayscale(1); transition: all 0.4s; }
        .setup-tool.active { filter: grayscale(0); transform: scale(1.02); border-color: #3b82f6; box-shadow: 0 0 20px rgba(59,130,246,0.2); }
    </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // --- ÍCONOS ---
    const CheckCircle2 = ({ size=18 }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>;
    const XCircle = ({ size=18 }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>;
    const AlertCircle = ({ size=18 }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>;

    // --- DATOS ---
    const EQUIPMENT_CART = [
        { category: "1. Termorregulación", items: [
            { id: 'cuna', name: 'Cuna Radiante' }, { id: 'bolsa_poli', name: 'Bolsa Polietileno' },
            { id: 'gorro', name: 'Gorro lana' }, { id: 'colchon', name: 'Colchón Térmico' },
            { id: 'term_rectal', name: 'Termómetro Rectal' }
        ]},
        { category: "2. Ventilación y Oxígeno", items: [
            { id: 'neopuff', name: 'NeoPuff' }, { id: 'ambu', name: 'Ambu con reservorio' },
            { id: 'mascara_0', name: 'Máscara #0' }, { id: 'mascara_1', name: 'Máscara #1' },
            { id: 'blender', name: 'Mezclador FiO2' }
        ]},
        { category: "3. Vía Aérea Avanzada", items: [
            { id: 'laringo', name: 'Laringoscopio' }, { id: 'ml', name: 'Máscara Laríngea' },
            { id: 'tubo_25', name: 'Tubo ET 2.5' }, { id: 'tubo_30', name: 'Tubo ET 3.0' },
            { id: 'tubo_35', name: 'Tubo ET 3.5' }, { id: 'tubo_40', name: 'Tubo ET 4.0' }
        ]},
        { category: "4. Drogas y Accesos", items: [
            { id: 'surfactante', name: 'Surfactante' }, { id: 'adrenalina', name: 'Adrenalina 1:10k' },
            { id: 'sf', name: 'Suero Fisiológico' }, { id: 'umbilical', name: 'Catéter Umbilical' }
        ]},
        { category: "5. Monitorización", items: [
            { id: 'steto', name: 'Estetoscopio' }, { id: 'spo2', name: 'Saturómetro' }
        ]}
    ];

    const CASES = [
        { id: 1, title: "Prematuro 27s — SDR Severo", vignette: "27 semanas. Sin corticoides antenatales. Líquido claro. Expulsivo inminente.", eg: 27, liq: "Claro", hr: 70, spo2: 45, tone: "Flácido", cry: "Apnea" },
        { id: 2, title: "SAM Severo — Post término", vignette: "41 semanas. Monitor fetal con bradicardia mantenida. Líquido meconial espeso.", eg: 41, liq: "Meconial", hr: 55, spo2: 35, tone: "Pobre", cry: "Jadeo" }
    ];

    const GUIDELINES = {
        spo2: [
            { min: 1, val: "60-65%" }, { min: 2, val: "65-70%" }, { min: 3, val: "70-75%" },
            { min: 4, val: "75-80%" }, { min: 5, val: "80-85%" }, { min: 10, val: "85-95%" }
        ],
        settings: { pip: "20-25 cmH2O", peep: "5 cmH2O", fio2_pre: "21-30%", fio2_term: "21%", flow: "10 L/min" }
    };

    // =============================================================
    // COMPONENTE ONDA CONTINUA (CANVAS REAL-TIME)
    // =============================================================
    const WaveMonitor = ({ type, hrRef, spo2Ref, color }) => {
        const canvasRef = useRef(null);

        useEffect(() => {
            const canvas = canvasRef.current;
            const ctx = canvas.getContext('2d');
            let animationFrameId;
            let x = 0;
            let lastY = 22;
            const speed = 1.5; 
            const width = canvas.width;
            const height = canvas.height;
            const sweepWidth = 15; 
            
            let phase = 0;
            let lastTime = performance.now();

            const draw = (now) => {
                const delta = (now - lastTime) / 1000; 
                lastTime = now;

                const hr = hrRef.current || 0;
                const spo2 = spo2Ref.current || 0;

                let targetY = height / 2;

                if (hr > 0) {
                    const beatIntervalSec = 60 / hr; 
                    phase += delta / beatIntervalSec;
                    if (phase >= 1) phase -= 1; 

                    if (type === 'ecg') {
                        const hrFactor = Math.min(1.5, Math.max(0.8, hr / 100)); 
                        if (phase > 0.05 && phase < 0.1) targetY = height/2 - (4 * hrFactor); 
                        else if (phase > 0.15 && phase < 0.17) targetY = height/2 + (6 * hrFactor); 
                        else if (phase >= 0.17 && phase < 0.20) targetY = height/2 - (20 * hrFactor); 
                        else if (phase >= 0.20 && phase < 0.23) targetY = height/2 + (8 * hrFactor); 
                        else if (phase > 0.35 && phase < 0.45) targetY = height/2 - (6 * hrFactor); 
                        else targetY = height/2;
                    } else if (type === 'pleth') {
                        const scale = Math.max(0.1, spo2 / 100);
                        const amp = 16 * scale; 
                        if (phase < 0.2) { 
                            targetY = height/2 + 15 - (phase/0.2) * amp * 2; 
                        } else if (phase < 0.35) { 
                            targetY = height/2 + 15 - amp * 2 + ((phase-0.2)/0.15) * (amp * 0.8); 
                        } else if (phase < 0.45) { 
                            targetY = height/2 + 15 - amp * 1.2 - Math.sin((phase-0.35)*Math.PI*10)*2; 
                        } else { 
                            targetY = height/2 + 15 - amp * 1.2 + ((phase-0.45)/0.55) * (amp * 1.2); 
                        }
                    }
                } else {
                    targetY = height / 2; 
                }

                const y = lastY + (targetY - lastY) * (type === 'ecg' ? 0.6 : 0.3);

                ctx.beginPath();
                ctx.moveTo(x - speed, lastY);
                ctx.lineTo(x, y);
                ctx.strokeStyle = color;
                ctx.lineWidth = 2;
                ctx.lineJoin = 'round';
                ctx.stroke();

                lastY = y;
                ctx.clearRect(x, 0, sweepWidth, height); 

                x += speed;

                if (x >= width) {
                    x = 0;
                    ctx.clearRect(0, 0, sweepWidth, height);
                }

                animationFrameId = requestAnimationFrame(draw);
            };

            ctx.clearRect(0, 0, width, height);
            animationFrameId = requestAnimationFrame(draw);

            return () => cancelAnimationFrame(animationFrameId);
        }, [color, type, hrRef, spo2Ref]);

        return (
            <div className="wave-container" style={{ borderTop: '1px solid rgba(255,255,255,0.05)', borderBottom: '1px solid rgba(255,255,255,0.05)', backgroundColor: 'transparent' }}>
                <canvas ref={canvasRef} width="400" height="44" style={{ width: '100%', height: '100%', display: 'block' }} />
            </div>
        );
    };

    // =============================================================
    // MANÓMETRO DINÁMICO INDEPENDIENTE
    // Lógica Corregida: El Ambú calza con la presión real sin lag. NeoPuff salta inmediato.
    // =============================================================
    const Manometer = ({ mode, isVPPActive, isMaskSealed, pipSetting, guidedMode, ventPressStartRef }) => {
        const needleRef = useRef(null);
        const currPressRef = useRef(0);

        useEffect(() => {
            let raf;
            const draw = () => {
                let target = 0;
                if (mode === 'neopuff') {
                    // NeoPuff: 5 de base si está sellado, PIP si se aprieta. 
                    if (isMaskSealed) target = isVPPActive ? pipSetting : 5;
                } else if (mode === 'ambu') {
                    // Ambú: Sube inmediatamente dependiendo de cuánto tiempo se mantenga apretado
                    if (isVPPActive && isMaskSealed && ventPressStartRef.current > 0) {
                        const dur = Date.now() - ventPressStartRef.current;
                        target = Math.min(60, 10 + (dur / 15)); 
                    } else {
                        target = 0; 
                    }
                }

                // Ajuste de "fricción" de la aguja. NeoPuff casi instantáneo, Ambú sigue la mano.
                const smoothFactor = mode === 'neopuff' ? 0.8 : 0.8;
                currPressRef.current += (target - currPressRef.current) * smoothFactor;

                if (needleRef.current) {
                    const visualPress = Math.min(currPressRef.current, 45); // No dejar que gire loco visualmente más de 45
                    const angle = (visualPress * 4.5) - 90;
                    needleRef.current.style.transform = `rotate(${angle}deg)`;
                }
                raf = requestAnimationFrame(draw);
            };
            raf = requestAnimationFrame(draw);
            return () => cancelAnimationFrame(raf);
        }, [mode, isVPPActive, isMaskSealed, pipSetting]);

        const hideNeedle = mode === 'ambu' && !guidedMode;

        return (
            <div className="flex flex-col items-center p-4 bg-slate-900 border border-slate-800 rounded-3xl w-36 h-36 relative">
                <div className="w-28 h-28 border-4 border-slate-700 rounded-full flex items-center justify-center bg-slate-950 relative">
                    <div ref={needleRef} className="absolute w-1 h-12 bg-blue-500 origin-bottom transition-transform duration-75"
                         style={{ bottom: '50%', opacity: hideNeedle ? 0 : 1 }}></div>
                    <div className="w-2 h-2 bg-white rounded-full z-10"></div>
                    {/* ETIQUETAS MANTENIDAS EXACTAMENTE COMO EL USUARIO LAS PUSO */}
                    <div className="absolute top-1 text-[7px] font-bold text-slate-500">20</div>
                    <div className="absolute right-1 text-[7px] font-bold text-slate-500">40</div>
                    <div className="absolute left-1 text-[7px] font-bold text-slate-500">0</div>
                    <div className="absolute bottom-4 right-3 text-[5px] font-black text-emerald-500">PEEP</div>
                </div>
                <span className="text-[7px] font-black text-slate-500 mt-2 uppercase tracking-widest text-center">Presión cmH2O</span>
            </div>
        );
    };

    // =============================================================
    // APP PRINCIPAL
    // =============================================================
    function App() {
        const [gameState, setGameState] = useState('menu');
        const [currentCase, setCurrentCase] = useState(null);
        const [guidedMode, setGuidedMode] = useState(true);

        const [timer, setTimer] = useState(0);
        const [vitals, setVitals] = useState({ hr: 0, spo2: 0 });
        const [logs, setLogs] = useState([]);
        const [rhythmMsg, setRhythmMsg] = useState("");
        const [procModal, setProcModal] = useState(null);
        const [assistantHint, setAssistantHint] = useState("");
        const [uiToggle, setUiToggle] = useState(0);

        const [selectedEquip, setSelectedEquip] = useState([]);
        const [askedBriefing, setAskedBriefing] = useState([]);
        const [askedBirth, setAskedBirth] = useState([]);
        const [preArrivalTimer, setPreArrivalTimer] = useState(25);
        const [setupStatus, setSetupStatus] = useState({ heat: false, blender: 21, suction: false });

        const [mode, setMode] = useState('neopuff');
        const [pip, setPip] = useState(20);
        const [fio2, setFio2] = useState(21);
        const [flow, setFlow] = useState(10);
        const [isMaskSealed, setIsMaskSealed] = useState(false);
        const [isVPPActive, setIsVPPActive] = useState(false);
        const [ventCount, setVentCount] = useState(0);

        const timerIntervalRef = useRef(null);
        const ventPressStartRef = useRef(0);

        // Refs para el motor de simulación
        const stateRef = useRef({
            hr: 0, spo2: 0,
            mode: 'neopuff', pip: 20, flow: 10,
            isMaskSealed: false,
            timerValue: 0,
            stableTimer: 0,
            sopaSteps: [], thermalActions: [], drugs: [], equips: [],
            lastVentTime: 0, timestamps: {},
            lungDamage: 0, hyperventilation: false,
            spontaneousBreathing: false // NUEVA PROPIEDAD: Respiración espontánea
        });

        const hrDisplayRef = useRef(0);
        const spo2DisplayRef = useRef(0);

        useEffect(() => {
            stateRef.current.mode = mode;
            stateRef.current.pip = pip;
            stateRef.current.flow = flow;
            stateRef.current.equips = selectedEquip;
            stateRef.current.isMaskSealed = isMaskSealed;
        }, [mode, pip, flow, selectedEquip, isMaskSealed]);

        // --- PRE-ARRIVAL TIMER ---
        useEffect(() => {
            if (gameState === 'setup') {
                if (preArrivalTimer > 0) {
                    const t = setInterval(() => setPreArrivalTimer(p => p - 1), 1000);
                    return () => clearInterval(t);
                } else {
                    setFio2(setupStatus.blender);
                    setGameState('birth');
                }
            }
        }, [gameState, preArrivalTimer]);

        // --- ASISTENTE GUIADO ---
        useEffect(() => {
            if (!guidedMode || gameState !== 'resus') return;
            const { hr, thermalActions, sopaSteps, drugs, mode: m, lungDamage, spontaneousBreathing } = stateRef.current;
            if (timer < 30) {
                if (currentCase.eg < 32 && !thermalActions.includes('bolsa_poli')) {
                    setAssistantHint("PASO 1: Prematuro extremo. Usa BOLSA POLI y GORRO. NO lo seques.");
                } else if (!thermalActions.includes('posicionar')) {
                    setAssistantHint("PASO 1: Realiza pasos iniciales: Posición de olfateo y estimulación.");
                } else {
                    setAssistantHint("Evaluación inicial completa. Revisa FC y esfuerzo respiratorio.");
                }
            } else if (lungDamage > 0) {
                setAssistantHint("¡CUIDADO! Presión excesiva entregada. Posible Neumotórax a Tensión.");
            } else if (spontaneousBreathing) {
                setAssistantHint("¡Excelente! El paciente recuperó el esfuerzo respiratorio. Evalúa apagar soporte.");
            } else if (hr < 100 && timer >= 30) {
                if (m === 'apagado' || m === 'freeflow') {
                    setAssistantHint("PASO 2: FC < 100 lpm. Selecciona NeoPuff o Ambu y sella la mascarilla.");
                } else if (sopaSteps.length === 0 && ventCount > 10) {
                    setAssistantHint("PASO 3: VPP sin respuesta. Aplica MR. SOPA para corregir sello y vía aérea.");
                } else if (hr < 60 && timer > 90) {
                    setAssistantHint("PASO 4: FC < 60. Considera intubación, catéter umbilical y Adrenalina.");
                } else {
                    setAssistantHint("PASO 2: Inicia VPP rítmica (40-60/min). Sella la mascarilla y ventila.");
                }
            } else if (hr >= 100) {
                if (currentCase.eg < 32 && !drugs.includes('surfactante')) {
                    setAssistantHint("PASO 5: FC estable, pero pulmón inmaduro no cede. Administra Surfactante antes de suspender VPP.");
                } else if (m !== 'apagado') {
                    setAssistantHint("Signos vitales mejorando. Cambia a modo 'Apagado' para confirmar respiración espontánea.");
                } else {
                    setAssistantHint("Evaluando respiración espontánea en aire ambiente...");
                }
            }
        }, [timer, guidedMode, gameState, currentCase, ventCount]);

        // --- MOTOR DE SIMULACIÓN ---
        useEffect(() => {
            if (gameState === 'resus') {
                stateRef.current.hr = currentCase.hr;
                stateRef.current.spo2 = currentCase.spo2;
                stateRef.current.timerValue = 0;
                stateRef.current.stableTimer = 0;
                stateRef.current.lungDamage = 0;
                stateRef.current.hyperventilation = false;
                stateRef.current.spontaneousBreathing = false;
                
                hrDisplayRef.current = currentCase.hr;
                spo2DisplayRef.current = currentCase.spo2;
                setVitals({ hr: currentCase.hr, spo2: currentCase.spo2 });

                timerIntervalRef.current = setInterval(() => {
                    stateRef.current.timerValue += 1;
                    const nt = stateRef.current.timerValue;
                    setTimer(nt);

                    if (nt === 30 && !guidedMode) addLog("[!] ALERTA 30s: Evaluar FC y respiración.", "alert");
                    if (nt === 60 && !guidedMode) addLog("[!] MINUTO DE ORO: Si FC < 100, iniciar VPP.", "alert");

                    const now = Date.now();
                    const { hr, spo2, mode: m, pip: p, flow: f, isMaskSealed: sealed,
                            sopaSteps, thermalActions, drugs, equips, lastVentTime, lungDamage, hyperventilation } = stateRef.current;

                    const isVenting = (now - lastVentTime) < 2500 && (m === 'neopuff' || m === 'ambu') && sealed;

                    let hrChange = -0.5;
                    let spo2Change = -0.5;

                    // --- EVALUAR RESPIRACIÓN ESPONTÁNEA ---
                    // Si el niño se mantiene sobre 100 y no tiene daño estructural grave sin resolver
                    if (hr >= 100 && nt > 30) {
                        if (currentCase.eg < 32 && !drugs.includes('surfactante')) {
                            // Prematuro severo SIN surfactante no puede sostener respiración espontánea útil (SDR)
                            stateRef.current.spontaneousBreathing = false;
                        } else {
                            // Recupera Drive Respiratorio
                            stateRef.current.spontaneousBreathing = true;
                        }
                    } else if (hr < 80) {
                        // Pierde Drive Respiratorio (Apnea secundaria)
                        stateRef.current.spontaneousBreathing = false;
                    }

                    // Penalización de Temperatura
                    if (currentCase.eg < 32) {
                        if (thermalActions.includes('secar')) hrChange -= 1.0;
                        if (!thermalActions.includes('bolsa_poli')) hrChange -= 0.5;
                    }

                    // Penalización por Barotrauma (Neumotórax a Tensión)
                    if (lungDamage > 0) {
                        hrChange -= (lungDamage * 1.5);
                        spo2Change -= (lungDamage * 2.0); // Cae dramáticamente a 0
                    }

                    if (hyperventilation) {
                        hrChange -= 0.8; // Atrapamiento aéreo
                    }

                    // --- CÁLCULO DE INTERVENCIONES ---
                    if (isVenting && lungDamage === 0) {
                        if (f < 8 && m === 'neopuff') {
                            hrChange -= 1.0;
                        } else {
                            const effective = currentCase.eg < 32
                                ? (p >= 25 || sopaSteps.includes('P') || sopaSteps.includes('A'))
                                : true;
                            if (effective && !hyperventilation) {
                                hrChange = 2.0; spo2Change = 1.0;
                                if (currentCase.eg < 32 && drugs.includes('surfactante')) hrChange += 1.5;
                                if (drugs.includes('adrenalina') && equips.includes('umbilical')) hrChange += 3.0;
                            } else if (!effective) {
                                hrChange = 0; spo2Change = 0;
                            }
                        }
                    } else if (m === 'freeflow') {
                        if (stateRef.current.spontaneousBreathing && lungDamage === 0) {
                            hrChange = 0.5; // El niño respira y le damos O2, mejora rápido
                            spo2Change = 1.0;
                            stateRef.current.stableTimer += 1;
                        } else {
                            hrChange = -0.2; // Apnea con flujo libre no es suficiente
                            spo2Change = 0.2;
                        }
                    } else if (m === 'apagado') {
                        if (stateRef.current.spontaneousBreathing && lungDamage === 0) {
                            hrChange = 0; // FC se estabiliza sola
                            spo2Change = 0.5; // Sube lentamente con aire ambiental
                            stateRef.current.stableTimer += 1;
                        } else {
                            hrChange = -1.5; // Si apagamos y estaba en apnea, colapsa.
                            spo2Change = -1.0;
                            stateRef.current.stableTimer = 0;
                        }
                    }

                    const newHr = Math.max(0, Math.min(160, hr + hrChange));
                    const newSpo2 = Math.max(0, Math.min(98, spo2 + spo2Change));

                    stateRef.current.hr = newHr;
                    stateRef.current.spo2 = newSpo2;

                    hrDisplayRef.current = Math.floor(newHr);
                    spo2DisplayRef.current = Math.floor(newSpo2);

                    setVitals({ hr: Math.floor(newHr), spo2: Math.floor(newSpo2) });

                    if (newHr === 0) setGameState('fail');
                    if (stateRef.current.stableTimer >= 5 && nt > 60 && lungDamage === 0) setGameState('success');

                }, 1000);
            } else {
                clearInterval(timerIntervalRef.current);
            }
            return () => clearInterval(timerIntervalRef.current);
        }, [gameState, currentCase, guidedMode]);

        const formatTime = (s) => `${Math.floor(s/60)}:${(s%60).toString().padStart(2,'0')}`;

        const addLog = (m, status = 'info') => {
            const icons = { info: '🔹', correct: '✅', error: '❌', alert: '🔔', late: '⏰', warn: '⚠️' };
            setLogs(prev => [{ t: formatTime(stateRef.current.timerValue), m, icon: icons[status], status }, ...prev]);
        };

        const markTimestamp = (action) => {
            if (!stateRef.current.timestamps[action]) {
                stateRef.current.timestamps[action] = stateRef.current.timerValue;
            }
        };

        // --- LÓGICA DE VENTILACIÓN SENSITIVA (AMBU/NEOPUFF) ---
        const handleVentStart = (e) => {
            if (e) e.preventDefault();
            if (mode === 'freeflow' || mode === 'apagado') return;
            if (!stateRef.current.isMaskSealed) { setRhythmMsg("¡SELLA LA MÁSCARA!"); return; }

            ventPressStartRef.current = Date.now();
            setIsVPPActive(true);
            markTimestamp('vpp_start');
        };

        const handleVentEnd = (e) => {
            if (e) e.preventDefault();
            if (!stateRef.current.isMaskSealed || ventPressStartRef.current === 0) return;

            const now = Date.now();
            const pressDuration = now - ventPressStartRef.current;
            ventPressStartRef.current = 0;
            setIsVPPActive(false);

            const diffSeconds = (now - stateRef.current.lastVentTime) / 1000;
            stateRef.current.lastVentTime = now;
            setVentCount(c => c + 1);

            // Calcular Barotrauma (Neumotórax) Exacto
            let generatedPip = pip; 
            if (mode === 'ambu') {
                generatedPip = Math.min(60, 10 + (pressDuration / 15)); 
            }

            const damageThreshold = currentCase.eg < 32 ? 28 : 38;
            if (generatedPip > damageThreshold) {
                stateRef.current.lungDamage += 1;
                addLog(`ALERTA: Presión excesiva entregada (${Math.round(generatedPip)} cmH2O). Riesgo barotrauma.`, "error");
            } else if (mode === 'neopuff' && pressDuration > 1500) {
                // El NeoPuff no genera más presión, pero mantener el dedo pegado mucho rato (TI prolongado) daña igual.
                stateRef.current.lungDamage += 0.5;
                addLog(`ALERTA: Tiempo Inspiratorio prolongado. Riesgo de daño pulmonar.`, "error");
            }

            if (diffSeconds > 0.1) {
                if (diffSeconds < 0.8) { 
                    setRhythmMsg("¡RÁPIDO!"); 
                    stateRef.current.hyperventilation = true;
                    if (!guidedMode && Math.random() > 0.8) addLog("Ritmo muy rápido. Riesgo atrapamiento aéreo.", "warn"); 
                }
                else if (diffSeconds > 2.8) { 
                    setRhythmMsg("LENTO..."); 
                    stateRef.current.hyperventilation = false;
                    if (!guidedMode && Math.random() > 0.8) addLog("Ritmo insuficiente.", "late"); 
                }
                else { 
                    setRhythmMsg("RITMO CORRECTO ✓"); 
                    stateRef.current.hyperventilation = false;
                }
            }
            setTimeout(() => { setRhythmMsg(""); }, 300);
        };

        const registerAction = (type, value) => {
            markTimestamp(value);
            if (type === 'thermal') {
                if (!stateRef.current.thermalActions.includes(value)) {
                    stateRef.current.thermalActions.push(value);
                    if (value === 'secar' && currentCase.eg < 32)
                        addLog("ERROR CRÍTICO: Prematuros <32s NO se secan. Riesgo hipotermia.", "error");
                    else addLog(`Paso: ${value.replace(/_/g, ' ')} realizado.`, 'correct');
                    setUiToggle(p => p + 1);
                }
            } else if (type === 'sopa') {
                if (!stateRef.current.sopaSteps.includes(value)) {
                    stateRef.current.sopaSteps.push(value);
                    addLog(`MR SOPA [${value}] ejecutado.`, 'correct');
                    setUiToggle(p => p + 1);
                }
            } else if (type === 'drug') {
                if (!stateRef.current.drugs.includes(value)) {
                    stateRef.current.drugs.push(value);
                    addLog(`Fármaco administrado: ${value}.`, 'correct');
                    setUiToggle(p => p + 1);
                }
            }
        };

        const startGame = () => {
            const c = CASES[Math.floor(Math.random() * CASES.length)];
            setCurrentCase(c);
            setGameState('vignette');
            setTimer(0); setLogs([]); 
            // NO limpiamos selectedEquip aquí para mantenerlo si el usuario ya preparó el carro
            setAskedBriefing([]); setAskedBirth([]);
            setVentCount(0); setAssistantHint("");
            setPreArrivalTimer(25); setIsMaskSealed(false);
            setMode('neopuff'); setPip(20); setFio2(21); setFlow(10);
            hrDisplayRef.current = 0;
            spo2DisplayRef.current = 0;
            ventPressStartRef.current = 0;
            stateRef.current = {
                hr: c.hr, spo2: c.spo2, mode: 'neopuff', pip: 20, flow: 10,
                isMaskSealed: false, timerValue: 0, stableTimer: 0,
                sopaSteps: [], thermalActions: [], drugs: [], equips: selectedEquip,
                lastVentTime: 0, timestamps: {}, lungDamage: 0, hyperventilation: false,
                spontaneousBreathing: false
            };
        };

        // --- DEBRIEFING ---
        const Debriefing = () => {
            const t = stateRef.current.timestamps;
            const actions = stateRef.current.thermalActions;
            const dmg = stateRef.current.lungDamage;
            const isPremature = currentCase.eg < 32;
            const rubric = [];

            if (dmg > 0) rubric.push({ text: "Falta Crítica: Causaste daño pulmonar/neumotórax por presiones altas o tiempos prolongados.", pass: false });

            if (isPremature) {
                if (actions.includes('secar')) rubric.push({ text: "Error: Secaste a un prematuro <32s. Causa hipotermia severa.", pass: false });
                if (t['bolsa_poli']) {
                    rubric.push({ text: t['bolsa_poli'] <= 45 ? `Excelente: Bolsa de Polietileno precoz (${formatTime(t['bolsa_poli'])}).` : `Tardío: Bolsa de Polietileno aplicada tarde (${formatTime(t['bolsa_poli'])}). Ideal antes de 40s.`, pass: t['bolsa_poli'] <= 45 ? true : 'partial' });
                } else {
                    rubric.push({ text: "Falta crítica: No usaste Bolsa de Polietileno en prematuro extremo.", pass: false });
                }
            } else {
                rubric.push({ text: t['secar'] && t['secar'] <= 40 ? `Pasos iniciales: Secado adecuado (${formatTime(t['secar'])}).` : "Pasos iniciales: Retraso u omisión en secado/estimulación.", pass: t['secar'] && t['secar'] <= 40 });
            }
            rubric.push({ text: t['posicionar'] && t['posicionar'] <= 50 ? `Vía aérea: Posición de olfateo temprana (${formatTime(t['posicionar'])}).` : "Vía aérea: Retraso en permeabilizar vía aérea.", pass: t['posicionar'] && t['posicionar'] <= 50 ? true : 'partial' });
            if (t['vpp_start']) {
                rubric.push({ text: t['vpp_start'] <= 75 ? `Minuto de oro: VPP iniciada a tiempo (${formatTime(t['vpp_start'])}).` : `Minuto de oro: VPP tardía (${formatTime(t['vpp_start'])}). Riesgo hipoxia prolongada.`, pass: t['vpp_start'] <= 75 });
            } else {
                rubric.push({ text: "Falta crítica: No se administró Presión Positiva (VPP).", pass: false });
            }
            if (t['P'] || t['A']) rubric.push({ text: "Corrección: Uso adecuado de pasos avanzados MR. SOPA.", pass: true });
            if (isPremature) {
                rubric.push({ text: t['surfactante'] ? "Manejo SDR: Surfactante administrado correctamente." : "Manejo SDR: Se omitió Surfactante esencial.", pass: !!t['surfactante'] });
            }

            return (
                <div className="w-full mt-6 bg-slate-950 p-6 rounded-3xl border border-slate-800 text-left max-h-64 overflow-y-auto">
                    <h3 className="text-sm font-black text-blue-400 uppercase tracking-widest mb-4 border-b border-blue-900/50 pb-2">Auditoría Clínica (AHA)</h3>
                    <ul className="space-y-3">
                        {rubric.map((r, i) => (
                            <li key={i} className="flex gap-3 items-start">
                                <span className={r.pass === true ? 'text-emerald-500' : r.pass === false ? 'text-rose-500' : 'text-amber-500'}>
                                    {r.pass === true ? <CheckCircle2 /> : r.pass === false ? <XCircle /> : <AlertCircle />}
                                </span>
                                <span className={`text-[11px] leading-snug font-medium ${r.pass === true ? 'text-emerald-100' : r.pass === false ? 'text-rose-200' : 'text-amber-100'}`}>{r.text}</span>
                            </li>
                        ))}
                    </ul>
                    <p className="text-[10px] text-slate-500 italic mt-4 pt-3 border-t border-slate-800">En un ECOE real se aplica un margen clínico sobre las metas AHA estrictas.</p>
                </div>
            );
        };

        // =====================================================================
        // VISTAS
        // =====================================================================
        if (gameState === 'menu') return (
            <div className="min-h-screen flex flex-col items-center justify-center p-8 text-center">

                </div>

                    <h2 className="text-3xl font-black mb-6 leading-tight text-white">{currentCase.title}</h2>

                    <button onClick={() => setGameState('briefing')} className="w-full bg-blue-600 py-5 rounded-2xl font-black uppercase tracking-widest shadow-lg">Asistir al Parto</button>

        if (gameState === 'briefing') return (

                            {!askedBriefing.includes(it.id) && <div className="absolute inset-0 flex items-center justify-center bg-slate-900/80 text-[10px] font-black text-slate-500 uppercase tracking-widest">Interrogar</div>}

                </div>
                <button disabled={askedBriefing.length < 4} onClick={() => setGameState('prep')} className="w-full mt-10 bg-white text-black font-black py-5 rounded-3xl disabled:opacity-20 uppercase tracking-widest shadow-xl">Revisar Carro de Paro</button>

        if (gameState === 'prep') return (

                                        <span className="text-[9px] font-black uppercase text-center leading-tight">{it.name}</span>
                                    </button>
                                );
                            })}
                        </div>
                    </div>
                ))}
                <div className="fixed bottom-0 left-0 right-0 p-8 bg-slate-900 border-t border-slate-800 max-w-4xl mx-auto rounded-t-[3rem] z-50 shadow-2xl">
                    <button onClick={() => { stateRef.current.equips = selectedEquip; setGameState('setup'); }} className="w-full bg-emerald-600 py-5 rounded-[2rem] font-black uppercase shadow-xl tracking-widest active:scale-95 transition-all">Confirmar e Ir a Sala</button>
                </div>
            </div>
        );

        if (gameState === 'setup') return (
            <div className="min-h-screen bg-black flex flex-col p-6 items-center justify-center">
                <div className="w-full max-w-4xl">
                    <header className="text-center mb-12">
                        <div className="text-6xl font-black mb-4 text-rose-500 monitor-font animate-pulse">00:{preArrivalTimer.toString().padStart(2,'0')}</div>
                        <h2 className="text-xl font-bold uppercase tracking-widest text-slate-400">Preparación de la Unidad</h2>
                        <p className="text-slate-600 text-sm">El recién nacido llegará pronto. Realiza el Checklist.</p>
                    </header>
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <button onClick={() => setSetupStatus({...setupStatus, heat: !setupStatus.heat})} className={`setup-tool p-8 rounded-[3rem] border-4 bg-slate-900 flex flex-col items-center gap-4 ${setupStatus.heat ? 'active' : 'border-slate-800'}`}>
                            <div className={`w-12 h-12 rounded-full flex items-center justify-center ${setupStatus.heat ? 'bg-orange-500 shadow-lg' : 'bg-slate-800'}`}><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5"><path d="M12 2v4m0 12v4M4.93 4.93l2.83 2.83m8.48 8.48l2.83 2.83M2 12h4m12 0h4M4.93 19.07l2.83-2.83m8.48-8.48l2.83-2.83"/></svg></div>
                            <span className="text-xs font-black uppercase">Cuna Radiante</span>
                            <span className={`text-[10px] px-3 py-1 rounded-full ${setupStatus.heat ? 'bg-orange-500/20 text-orange-400' : 'bg-slate-800 text-slate-600'}`}>{setupStatus.heat ? 'ON — CALENTANDO' : 'OFF'}</span>
                        </button>
                        <div className={`setup-tool p-8 rounded-[3rem] border-4 bg-slate-900 flex flex-col items-center gap-4 ${setupStatus.blender > 21 ? 'active' : 'border-slate-800'}`}>
                            <div className="w-12 h-12 bg-blue-500 rounded-full flex items-center justify-center shadow-lg"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5"><path d="M20 7h-9m3 10H5M9 7v10m6-10v10"/></svg></div>
                            <span className="text-xs font-black uppercase">Mezclador FiO2</span>
                            <span className="text-3xl font-black monitor-font text-blue-400">{setupStatus.blender}%</span>
                            <input type="range" min="21" max="100" step="1" value={setupStatus.blender} onChange={(e) => setSetupStatus({...setupStatus, blender: parseInt(e.target.value)})} className="w-full"/>
                        </div>
                        <button onClick={() => setSetupStatus({...setupStatus, suction: !setupStatus.suction})} className={`setup-tool p-8 rounded-[3rem] border-4 bg-slate-900 flex flex-col items-center gap-4 ${setupStatus.suction ? 'active' : 'border-slate-800'}`}>
                            <div className={`w-12 h-12 rounded-full flex items-center justify-center ${setupStatus.suction ? 'bg-emerald-500 shadow-lg' : 'bg-slate-800'}`}><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5"><path d="M12 2v20m-7-5 7 5 7-5"/></svg></div>
                            <span className="text-xs font-black uppercase">Sistema Succión</span>
                            <span className={`text-[10px] px-3 py-1 rounded-full ${setupStatus.suction ? 'bg-emerald-500/20 text-emerald-400' : 'bg-slate-800 text-slate-600'}`}>{setupStatus.suction ? 'LISTA (80-100 mmHg)' : 'OFF'}</span>
                        </button>
                    </div>
                    <div className="mt-12 text-center">
                        <button onClick={() => { setFio2(setupStatus.blender); setGameState('birth'); }} className="bg-slate-800 px-8 py-3 rounded-2xl text-[10px] font-black uppercase tracking-widest hover:bg-slate-700">Omitir espera y recibir RN</button>
                    </div>
                </div>
            </div>
        );

        if (gameState === 'birth') return (
            <div className="min-h-screen flex flex-col items-center justify-center p-6">
                <h2 className="text-3xl font-black mb-12 uppercase tracking-widest text-amber-500 text-center">3. Evaluación al Nacer</h2>
                <div className="grid gap-4 w-full max-w-md">
                    {[
                        { id:'t', q:"¿Es de Término?", a: currentCase.eg >= 37 ? "Sí" : `No (${currentCase.eg} sem)` },
                        { id:'to', q:"¿Tiene Tono?", a: currentCase.tone },
                        { id:'r', q:"¿Respira o Llora?", a: currentCase.cry }
                    ].map(it => (
                        <button key={it.id} onClick={() => !askedBirth.includes(it.id) && setAskedBirth(p => [...p, it.id])} className={`p-10 rounded-[3rem] border-2 transition-all relative overflow-hidden ${askedBirth.includes(it.id) ? 'border-amber-600 bg-amber-600/10 scale-105' : 'border-slate-800 bg-slate-900'}`}>
                            <p className="text-[10px] font-black text-amber-500 uppercase mb-2">{it.q}</p>
                            <p className={`text-3xl font-black text-white transition-all ${askedBirth.includes(it.id) ? 'opacity-100' : 'opacity-0'}`}>{it.a}</p>
                            {!askedBirth.includes(it.id) && <div className="absolute inset-0 flex items-center justify-center bg-slate-900/80 text-[10px] font-black text-slate-300 uppercase tracking-widest">Evaluar</div>}
                        </button>
                    ))}
                </div>
                <button disabled={askedBirth.length < 3} onClick={() => setGameState('resus')} className="mt-14 bg-rose-600 py-5 px-20 rounded-3xl font-black uppercase tracking-widest animate-pulse shadow-2xl active:scale-95 transition-all disabled:opacity-40">Iniciar Reanimación</button>
            </div>
        );

        if (gameState === 'resus') return (
            <div className="min-h-screen p-4 pb-64 flex flex-col xl:flex-row gap-6 max-w-7xl mx-auto">

                {/* ── PANEL IZQUIERDO ── */}
                <div className="flex-1 flex flex-col gap-6">

                    {/* Monitor de signos vitales (Ondas Realistas Canvas) */}
                    <div className={`bg-black border-4 rounded-[2.5rem] p-6 shadow-2xl transition-colors ${timer >= 60 && vitals.hr < 100 ? 'pulse-red' : 'border-slate-800'}`}>
                        <div className="flex justify-between items-center mb-4">
                            <span className="text-[10px] font-black text-slate-600 uppercase tracking-widest">Monitor ECOE v3.0</span>
                            <span className="text-amber-500 font-bold monitor-font text-xl">{formatTime(timer)}</span>
                        </div>
                        <div className="grid grid-cols-2 gap-8">
                            <div>
                                <span className="text-[10px] font-bold text-emerald-500 uppercase">FC (BPM)</span>
                                <div className={`text-6xl font-black monitor-font ${timer >= 60 && vitals.hr < 100 ? 'text-rose-500' : 'text-emerald-400'}`}>{vitals.hr === 0 ? '--' : vitals.hr}</div>
                                <WaveMonitor type="ecg" hrRef={hrDisplayRef} spo2Ref={spo2DisplayRef} color="#10b981" />
                            </div>
                            <div className="text-right">
                                <span className="text-[10px] font-bold text-sky-500 uppercase">SpO2 (%)</span>
                                <div className="text-6xl font-black monitor-font text-sky-400">{vitals.spo2 === 0 ? '--' : vitals.spo2}</div>
                                <WaveMonitor type="pleth" hrRef={hrDisplayRef} spo2Ref={spo2DisplayRef} color="#38bdf8" />
                            </div>

                    </div>

                                        onClick={() => { setMode(m); if (m !== 'neopuff' && m !== 'ambu') { setIsMaskSealed(false); stateRef.current.isMaskSealed = false; } stateRef.current.mode = m; }}
                                        className={`px-2 py-1.5 rounded-lg text-[8px] font-black uppercase transition-all ${mode === m ? 'bg-blue-600 text-white shadow-md' : 'text-slate-500 hover:bg-slate-800 disabled:opacity-20'}`}>{m}</button>

                            ))}
                            {selectedEquip.includes('bolsa_poli') && <button onClick={() => registerAction('thermal','bolsa_poli')} className="text-[9px] px-4 py-2 rounded-xl font-black uppercase border border-blue-500 bg-blue-900/30 text-blue-300 hover:bg-blue-800/50 active:scale-95 transition-all">Bolsa Poli</button>}
                            {selectedEquip.includes('gorro') && <button onClick={() => registerAction('thermal','gorro')} className="text-[9px] px-4 py-2 rounded-xl font-black uppercase border border-blue-500 bg-blue-900/30 text-blue-300 hover:bg-blue-800/50 active:scale-95 transition-all">Gorro</button>}
                            {selectedEquip.includes('colchon') && <button onClick={() => registerAction('thermal','colchon')} className="text-[9px] px-4 py-2 rounded-xl font-black uppercase border border-blue-500 bg-blue-900/30 text-blue-300 hover:bg-blue-800/50 active:scale-95 transition-all">Colchón</button>}
                        </div>
                    </div>

                    <div className="grid grid-cols-2 gap-3">
                        <button onClick={() => setProcModal('mrsopa')} className="bg-amber-600/20 border border-amber-600 text-amber-500 font-black p-5 rounded-3xl text-[10px] uppercase shadow-lg tracking-widest hover:bg-amber-600/30 transition-colors">MR. SOPA</button>
                        <button onClick={() => setProcModal('advanced')} className="bg-slate-900 border border-slate-700 text-white font-black p-5 rounded-3xl text-[10px] uppercase shadow-lg tracking-widest hover:bg-slate-800 transition-colors">Vía Aérea</button>
                    </div>
                </div>

                {/* ── PANEL DERECHO ── */}
                <div className="flex-1 flex flex-col gap-6">

                    {/* Tablas de referencia AHA */}
                    <div className="bg-slate-900 border border-slate-800 rounded-[2.5rem] p-6 flex flex-col md:flex-row gap-6 shadow-xl">
                        <div className="flex-1">
                            <h4 className="text-[9px] font-black text-sky-400 uppercase tracking-widest mb-3 border-b border-slate-800 pb-1">Metas SpO2 (AHA)</h4>
                            <div className="grid grid-cols-2 gap-x-4 gap-y-1.5">
                                {GUIDELINES.spo2.map((g, i) => {
                                    const minActual = Math.floor(timer / 60) + 1;
                                    const isActive = g.min === Math.min(...GUIDELINES.spo2.filter(x => x.min <= minActual).map(x => x.min)) || (minActual >= 10 && g.min === 10);
                                    return (
                                        <div key={i} className={`flex justify-between text-[11px] font-bold px-1 rounded ${isActive ? 'text-amber-400 bg-amber-400/10' : 'text-slate-500'}`}>
                                            <span>{g.min} min:</span><span>{g.val}</span>
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                        <div className="w-px bg-slate-800 hidden md:block"></div>
                        <div className="flex-1">
                            <h4 className="text-[9px] font-black text-emerald-400 uppercase tracking-widest mb-3 border-b border-slate-800 pb-1">Ajustes VPP Iniciales</h4>
                            <div className="text-[11px] font-bold text-slate-500 space-y-1.5">
                                <div className="flex justify-between"><span>PIP:</span><span className="text-white">{GUIDELINES.settings.pip}</span></div>
                                <div className="flex justify-between"><span>PEEP:</span><span className="text-white">{GUIDELINES.settings.peep}</span></div>
                                <div className="flex justify-between"><span>FiO2 ≥35s:</span><span className="text-white">{GUIDELINES.settings.fio2_term}</span></div>
                                <div className="flex justify-between"><span>FiO2 &lt;35s:</span><span className="text-white">{GUIDELINES.settings.fio2_pre}</span></div>
                                <div className="flex justify-between"><span>Flujo:</span><span className="text-white">{GUIDELINES.settings.flow}</span></div>
                            </div>
                        </div>
                    </div>

                    {/* Área de ventilación */}
                    <div className="flex flex-col md:flex-row items-center justify-center gap-10 py-8 bg-slate-950/50 rounded-3xl border border-slate-800/50">
                        <div className="flex flex-col items-center gap-4">
                            {/* Botón de sello — actualiza el ref inmediatamente */}
                            {(mode === 'neopuff' || mode === 'ambu') && (
                                <button onClick={() => {
                                    const newVal = !isMaskSealed;
                                    stateRef.current.isMaskSealed = newVal;
                                    setIsMaskSealed(newVal);
                                    addLog(newVal ? "Mascarilla sellada (PEEP activo)." : "Mascarilla retirada.", newVal ? "correct" : "info");
                                }} className={`px-5 py-2 rounded-full text-[9px] font-black uppercase tracking-widest transition-all ${isMaskSealed ? 'bg-emerald-600 text-white shadow-lg' : 'bg-slate-800 text-slate-400 border border-slate-700 hover:bg-slate-700'}`}>
                                    {isMaskSealed ? 'Mascarilla Sellada ✓' : 'Sellar Mascarilla'}
                                </button>
                            )}

                            <div className="relative">
                                <div className={`absolute -top-12 left-1/2 -translate-x-1/2 bg-blue-600 text-white px-6 py-2 rounded-2xl text-sm font-black shadow-xl z-10 whitespace-nowrap transition-all ${rhythmMsg ? 'opacity-100 scale-100' : 'opacity-0 scale-50'}`}>{rhythmMsg}</div>

                                {mode === 'apagado' ? (
                                    <div className="w-40 h-40 rounded-full border-8 border-slate-800 bg-slate-900/50 flex items-center justify-center text-[10px] text-slate-500 font-black uppercase text-center p-6 leading-tight">Soporte Apagado<br/>Eval. Espontánea</div>
                                ) : mode !== 'freeflow' ? (
                                    <button onMouseDown={handleVentStart} onMouseUp={handleVentEnd} onMouseLeave={handleVentEnd} onTouchStart={handleVentStart} onTouchEnd={handleVentEnd}
                                        className={`w-40 h-40 rounded-full border-8 transition-all flex flex-col items-center justify-center ${isVPPActive ? 'bg-blue-600 scale-95 border-white shadow-inner' : 'bg-slate-900 border-blue-600 shadow-2xl shadow-blue-500/30'} ${!isMaskSealed ? 'opacity-40 grayscale cursor-not-allowed' : ''}`}>
                                        <svg className={`w-14 h-14 ${isVPPActive ? 'text-white' : 'text-blue-500'}`} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><circle cx="12" cy="12" r="4"/><path d="M12 2v20M2 12h20"/></svg>
                                    </button>
                                ) : (
                                    <div className="w-40 h-40 rounded-full border-8 border-slate-800 bg-slate-900/50 flex items-center justify-center text-[10px] text-slate-600 font-black uppercase text-center p-8 leading-tight">O2 Flujo Libre<br/>(A Distancia)</div>
                                )}
                            </div>
                        </div>

                        {/* Manómetro Dinámico */}
                        <Manometer mode={mode} isVPPActive={isVPPActive} isMaskSealed={isMaskSealed} pipSetting={pip} guidedMode={guidedMode} ventPressStartRef={ventPressStartRef} />
                    </div>

                    {/* Fármacos */}
                    <div className="flex gap-4">
                        <button onClick={() => registerAction('drug','surfactante')} disabled={!selectedEquip.includes('surfactante')} className="flex-1 bg-violet-700 hover:bg-violet-600 py-5 rounded-[2rem] font-black text-[10px] uppercase shadow-xl disabled:opacity-30 tracking-widest transition-all">Surfactante</button>
                        <button onClick={() => registerAction('drug','adrenalina')} disabled={!selectedEquip.includes('adrenalina')} className="flex-1 bg-rose-700 hover:bg-rose-600 py-5 rounded-[2rem] font-black text-[10px] uppercase shadow-xl disabled:opacity-30 tracking-widest transition-all">Adrenalina</button>
                    </div>
                </div>

                {/* ── PANEL INFERIOR FIJO: LOG + ASISTENTE ── */}
                <div className="fixed bottom-0 left-0 right-0 p-5 bg-slate-950 border-t border-slate-800 h-56 overflow-y-auto z-40 shadow-[0_-10px_20px_rgba(0,0,0,0.5)]">
                    <div className="flex justify-between items-center mb-3 border-b border-white/5 pb-2">
                        <span className="text-[10px] font-black text-slate-400 uppercase tracking-widest flex items-center gap-2">
                            Registro Clínico
                            {guidedMode && <span className="bg-blue-600 text-white px-2 py-0.5 rounded-full text-[8px] animate-pulse">MODO GUIADO</span>}
                        </span>
                        <span className="text-amber-500 font-bold monitor-font text-sm">{formatTime(timer)}</span>
                    </div>
                    {guidedMode && assistantHint && (
                        <div className="mb-3 bg-blue-900/30 border border-blue-500/50 p-3 rounded-xl flex items-start gap-3 shadow-lg">
                            <span className="text-xl">💡</span>
                            <span className="text-sm font-bold text-blue-300 leading-snug">{assistantHint}</span>
                        </div>
                    )}
                    {logs.length === 0 && <div className="text-[11px] text-slate-800 italic mt-4 text-center">Esperando conducta médica...</div>}
                    {logs.map((l, i) => (
                        <div key={i} className={`text-[11px] font-mono mb-2 flex gap-3 items-start py-2 px-3 rounded-xl border border-white/5 bg-white/5 ${l.status === 'alert' ? 'bg-amber-500/10 border-amber-500/30 animate-pulse' : ''}`}>
                            <span className="text-slate-600 shrink-0">[{l.t}]</span>
                            <span>{l.icon}</span>
                            <span className={l.status === 'error' ? 'text-rose-400 font-bold' : l.status === 'alert' ? 'text-amber-400 font-bold' : 'text-slate-200'}>{l.m}</span>
                        </div>
                    ))}
                </div>

                {/* ── MODAL MR. SOPA ── */}
                {procModal === 'mrsopa' && (
                    <div className="fixed inset-0 z-[100] bg-black/95 backdrop-blur-md flex items-center justify-center p-6 text-slate-900">
                        <div className="bg-white rounded-[3rem] p-10 max-w-xl w-full shadow-2xl">
                            <h3 className="text-2xl font-black mb-8 uppercase text-center tracking-widest">Correctivos: MR. SOPA</h3>
                            <div className="space-y-3">
                                {[
                                    {id:'M', n:'Máscara', d:'Ajustar sello facial.'},
                                    {id:'R', n:'Reposición', d:'Posición de olfateo.'},
                                    {id:'S', n:'Succión', d:'Boca y luego nariz.'},
                                    {id:'O', n:'Open (Boca Abierta)', d:'Levantar mandíbula.'},
                                    {id:'P', n:'Presión', d:'Aumentar PIP a 25-30 cmH2O.'},
                                    {id:'A', n:'Vía Alternativa', d:'Preparar intubación ET.'}
                                ].map(it => (
                                    <button key={it.id} onClick={() => registerAction('sopa', it.id)}
                                        className={`flex items-center gap-4 w-full p-4 rounded-3xl border-2 transition-all active:scale-95 ${stateRef.current.sopaSteps.includes(it.id) ? 'bg-emerald-50 border-emerald-500' : 'bg-slate-50 border-slate-100 hover:bg-slate-100'}`}>
                                        <span className={`w-12 h-12 rounded-2xl flex items-center justify-center font-black text-xl ${stateRef.current.sopaSteps.includes(it.id) ? 'bg-emerald-500 text-white' : 'bg-slate-200 text-slate-500'}`}>{it.id}</span>
                                        <div className="text-left"><p className="text-sm font-bold text-slate-900 leading-none mb-1">{it.n}</p><p className="text-[10px] text-slate-400">{it.d}</p></div>
                                    </button>
                                ))}
                            </div>
                            <button onClick={() => setProcModal(null)} className="w-full mt-10 bg-slate-900 text-white py-5 rounded-3xl font-black uppercase tracking-widest hover:bg-slate-800 transition-colors">Cerrar y Re-evaluar VPP</button>
                        </div>
                    </div>
                )}

                {/* ── MODAL VÍA AÉREA ── */}
                {procModal === 'advanced' && (
                    <div className="fixed inset-0 z-[100] bg-black/95 flex items-center justify-center p-6 text-slate-100">
                        <div className="bg-slate-900 p-10 rounded-[3rem] border border-slate-800 max-w-2xl w-full shadow-2xl">
                            <div className="flex justify-between items-center mb-10">
                                <h3 className="text-2xl font-black uppercase tracking-widest text-blue-400">Vía Aérea Avanzada</h3>
                                <button onClick={() => setProcModal(null)} className="text-rose-500 font-bold uppercase text-xs hover:text-rose-400">Cerrar</button>
                            </div>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-8 text-left">
                                <div className="space-y-4">
                                    <p className="text-[10px] font-black text-blue-500 uppercase border-b border-blue-900/50 pb-2 tracking-widest">Opción A: Intubación ET</p>
                                    <button disabled={!selectedEquip.includes('laringo')} onClick={() => addLog("Visualizo glotis con laringoscopio.", "correct")} className="w-full p-4 bg-slate-800 rounded-2xl text-[10px] font-bold uppercase hover:bg-blue-600 disabled:opacity-30 transition-colors">1. Colocar Laringoscopio</button>
                                    <div className="flex gap-2">
                                        {['tubo_25','tubo_30','tubo_35'].map(t => (
                                            <button key={t} disabled={!selectedEquip.includes(t)} onClick={() => { registerAction('sopa','A'); addLog(`Tubo ${t.split('_')[1]} insertado.`, "correct"); }} className="flex-1 p-3 bg-slate-800 rounded-xl text-[9px] font-bold uppercase hover:bg-blue-600 disabled:opacity-30 transition-colors">T.{t.split('_')[1]}</button>
                                        ))}
                                    </div>
                                    <button onClick={() => addLog("Tubo fijado y verificado.", "correct")} className="w-full p-4 bg-slate-800 rounded-2xl text-[10px] font-bold uppercase hover:bg-blue-600 transition-colors">3. Fijar Tubo</button>
                                </div>
                                <div className="space-y-4">
                                    <p className="text-[10px] font-black text-amber-500 uppercase border-b border-amber-900/50 pb-2 tracking-widest">Opción B: Máscara Laríngea</p>
                                    <button disabled={!selectedEquip.includes('ml')} onClick={() => { registerAction('sopa','A'); addLog("Máscara Laríngea insertada y sellada.", "correct"); }} className="w-full p-4 bg-slate-800 rounded-2xl text-[10px] font-bold uppercase hover:bg-amber-600 disabled:opacity-30 transition-colors">Insertar M. Laríngea</button>
                                </div>
                            </div>
                        </div>
                    </div>
                )}
            </div>
        );

        if (gameState === 'fail') return (
            <div className="min-h-screen flex items-center justify-center p-8 bg-slate-950">
                <div className="bg-slate-900 p-12 rounded-[4rem] border-4 border-rose-600 max-w-2xl w-full shadow-2xl">
                    <h2 className="text-4xl font-black mb-6 uppercase text-rose-500 tracking-tighter text-center">Fallecimiento Neonatal</h2>
                    <p className="text-slate-400 mb-6 text-lg text-center">El paciente no logró estabilizarse a tiempo.</p>
                    <Debriefing />
                    <button onClick={() => setGameState('menu')} className="w-full mt-8 bg-slate-800 hover:bg-slate-700 text-white py-6 rounded-3xl font-black uppercase tracking-widest transition-all">Volver al Menú</button>
                </div>
            </div>
        );

        if (gameState === 'success') return (
            <div className="min-h-screen flex items-center justify-center p-8 bg-slate-950">
                <div className="bg-slate-900 p-12 rounded-[4rem] border-4 border-emerald-600 max-w-2xl w-full shadow-2xl">
                    <h2 className="text-4xl font-black mb-6 uppercase text-emerald-500 tracking-tighter text-center">Reanimación Exitosa</h2>
                    <p className="text-slate-400 mb-6 text-lg text-center">Paciente estabilizado con respiración espontánea.</p>
                    <Debriefing />
                    <button onClick={() => setGameState('menu')} className="w-full mt-8 bg-emerald-600 hover:bg-emerald-500 text-white py-6 rounded-3xl font-black uppercase tracking-widest transition-all">Finalizar Guardia</button>
                </div>
            </div>
        );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
</script>
</body>
</html>
