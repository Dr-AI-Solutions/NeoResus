<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeoResus Master Pro - Alta Fidelidad</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #020617; color: #f8fafc; overflow-x: hidden; }
        .monitor-font { font-family: 'JetBrains Mono', monospace; }
        .pulse-red { animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; border-color: #ef4444; } 50% { opacity: 0.5; border-color: #7f1d1d; } }
        
        /* Animación de Ondas Monitor */
        .wave-container { height: 40px; width: 100%; overflow: hidden; position: relative; opacity: 0.5; margin-top: 5px; }
        .wave-svg { position: absolute; width: 200%; height: 100%; animation: move-wave 4s linear infinite; }
        @keyframes move-wave { from { transform: translateX(0); } to { transform: translateX(-50%); } }

        input[type=range] { -webkit-appearance: none; background: transparent; width: 100%; }
        input[type=range]::-webkit-slider-runnable-track { height: 6px; background: #1e293b; border-radius: 10px; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 18px; width: 18px; border-radius: 50%; background: #3b82f6; cursor: pointer; margin-top: -6px; border: 2px solid #fff; }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- ÍCONOS SVG INLINE PARA EL DEBRIEFING ---
        const CheckCircle2 = ({ className, size }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline>
            </svg>
        );
        const XCircle = ({ className, size }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line>
            </svg>
        );
        const AlertCircle = ({ className, size }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line>
            </svg>
        );

        const EQUIPMENT_CART = [
            { category: "1. Termorregulación", items: [
                { id: 'cuna', name: 'Cuna Radiante', correct: true },
                { id: 'bolsa_poli', name: 'Bolsa Polietileno', correct: true },
                { id: 'gorro', name: 'Gorro lana', correct: true },
                { id: 'colchon', name: 'Colchón Térmico', correct: true },
                { id: 'term_rectal', name: 'Termómetro Rectal', correct: false }
            ]},
            { category: "2. Ventilación y Oxígeno", items: [
                { id: 'neopuff', name: 'NeoPuff', correct: true },
                { id: 'ambu', name: 'Ambu con reservorio', correct: true },
                { id: 'mascara_0', name: 'Máscara #0', correct: true },
                { id: 'mascara_1', name: 'Máscara #1', correct: true },
                { id: 'blender', name: 'Mezclador FiO2', correct: true }
            ]},
            { category: "3. Vía Aérea Avanzada", items: [
                { id: 'laringo', name: 'Laringoscopio', correct: true },
                { id: 'ml', name: 'Máscara Laríngea', correct: true },
                { id: 'tubo_25', name: 'Tubo ET 2.5', correct: true },
                { id: 'tubo_30', name: 'Tubo ET 3.0', correct: true }, 
                { id: 'tubo_35', name: 'Tubo ET 3.5', correct: true }, 
                { id: 'tubo_40', name: 'Tubo ET 4.0', correct: true }
            ]},
            { category: "4. Drogas y Accesos", items: [
                { id: 'surfactante', name: 'Surfactante', correct: true },
                { id: 'adrenalina', name: 'Adrenalina 1:10k', correct: true },
                { id: 'sf', name: 'Suero Fisiológico', correct: true },
                { id: 'umbilical', name: 'Catéter Umbilical', correct: true }
            ]},
            { category: "5. Monitorización", items: [
                { id: 'steto', name: 'Estetoscopio', correct: true },
                { id: 'spo2', name: 'Saturómetro', correct: true }
            ]}
        ];

        // --- POOL EXTENDIDO DE 12 CASOS CLÍNICOS ---
        const CASES = [
            { id: 1, title: "Prematuro 27s - SDR Severo", vignette: "27 semanas. Sin corticoides antenatales. Líquido claro. Expulsivo inminente.", eg: 27, liq: "Claro", hr: 70, spo2: 45, tone: "Flácido", cry: "Apnea", risk: "Membrana Hialina / Hipotermia", cord: "Clampeo precoz por depresión.", surfactant: true, targetTube: "tubo_25" },
            { id: 2, title: "SAM Severo - Post término", vignette: "41 semanas. Monitor fetal con bradicardia mantenida. Líquido meconial espeso.", eg: 41, liq: "Meconial Espeso", hr: 55, spo2: 35, tone: "Pobre", cry: "Jadeo", risk: "Asfixia perinatal / Síndrome de Aspiración Meconial.", cord: "Clampeo inmediato.", surfactant: false, targetTube: "tubo_35" },
            { id: 3, title: "Shock Hemorrágico (DPPNI)", vignette: "38 semanas. Desprendimiento prematuro de placenta. Madre con sangrado profuso. El neonato es extraído por cesárea.", eg: 38, liq: "Hemático", hr: 40, spo2: 30, tone: "Muy flácido", cry: "Apnea", risk: "Shock hipovolémico fetal.", cord: "Clampeo inmediato por urgencia materna.", surfactant: false, targetTube: "tubo_35" },
            { id: 4, title: "Depresión por Anestesia", vignette: "39 semanas. Cesárea de emergencia con anestesia general materna. Bebé nace hipotónico pero rosado.", eg: 39, liq: "Claro", hr: 110, spo2: 65, tone: "Hipotónico", cry: "Apnea", risk: "Depresión respiratoria farmacológica transitoria.", cord: "Clampeo diferido si es posible.", surfactant: false, targetTube: "tubo_35" },
            { id: 5, title: "Hernia Diafragmática", vignette: "38 semanas. Ecografía prenatal revela hernia diafragmática izquierda. Abdomen excavado al nacer.", eg: 38, liq: "Claro", hr: 80, spo2: 50, tone: "Flácido", cry: "Esfuerzo asimétrico", risk: "Hipoplasia pulmonar. ¡No ventilar con mascarilla!", cord: "Clampeo precoz para asegurar vía aérea.", surfactant: false, targetTube: "tubo_35" },
            { id: 6, title: "Prematuro Tardío - RPM", vignette: "34 semanas. Rotura prematura de membranas de 48h. Madre febril.", eg: 34, liq: "Fétido", hr: 160, spo2: 70, tone: "Regular", cry: "Quejido débil", risk: "Corioamnionitis / Sepsis neonatal precoz.", cord: "Clampeo diferido si la hemodinamia lo permite.", surfactant: false, targetTube: "tubo_30" },
            { id: 7, title: "Nudo Verdadero de Cordón", vignette: "40 semanas. Caída súbita e irrecuperable de latidos en el expulsivo. Sale pálido y sin esfuerzo.", eg: 40, liq: "Claro", hr: 50, spo2: 35, tone: "Flácido", cry: "Apnea", risk: "Asfixia aguda intraparto profunda.", cord: "Clampeo inmediato.", surfactant: false, targetTube: "tubo_35" },
            { id: 8, title: "Gemelo B - Podálica", vignette: "30 semanas. Segundo gemelar extraído en presentación podálica tras 15 min de intervalo.", eg: 30, liq: "Claro", hr: 60, spo2: 45, tone: "Flácido", cry: "Apnea", risk: "Prematurez, trauma obstétrico leve, hipoxia.", cord: "Clampeo precoz por depresión.", surfactant: true, targetTube: "tubo_30" },
            { id: 9, title: "Hijo de Madre Diabética", vignette: "36 semanas. Madre diabética insulinodependiente mal controlada. Macrosómico (4.2kg).", eg: 36, liq: "Claro", hr: 130, spo2: 75, tone: "Pobre", cry: "Quejido", risk: "Macrosomía, hipoglicemia inminente, miocardiopatía.", cord: "Clampeo diferido.", surfactant: false, targetTube: "tubo_35" },
            { id: 10, title: "Prolapso de Cordón", vignette: "37 semanas. Prolapso de cordón diagnosticado hace 10 minutos. Cesárea stat.", eg: 37, liq: "Claro", hr: 55, spo2: 40, tone: "Flácido", cry: "Apnea", risk: "Asfixia aguda por compresión de cordón.", cord: "Clampeo inmediato.", surfactant: false, targetTube: "tubo_35" },
            { id: 11, title: "Cesárea Electiva - TTRN", vignette: "39 semanas. Cesárea electiva sin trabajo de parto previo. Nace activo pero inicia quejido rápido.", eg: 39, liq: "Claro", hr: 145, spo2: 80, tone: "Activo", cry: "Llora, luego quejido", risk: "Taquipnea transitoria por falta de reabsorción de líquido.", cord: "Clampeo diferido.", surfactant: false, targetTube: "tubo_35" },
            { id: 12, title: "Asfixia Leve a Moderada", vignette: "38 semanas. Circulares de cordón reductibles al cuello. Nace cianótico.", eg: 38, liq: "Claro", hr: 90, spo2: 55, tone: "Algo flexionado", cry: "Débil", risk: "Hipoxia transitoria.", cord: "Clampeo diferido evaluando respuesta.", surfactant: false, targetTube: "tubo_35" }
        ];

        const GUIDELINES = {
            spo2: [
                { min: 1, val: "60-65%" }, { min: 2, val: "65-70%" }, { min: 3, val: "70-75%" },
                { min: 4, val: "75-80%" }, { min: 5, val: "80-85%" }, { min: 10, val: "85-95%" }
            ],
            settings: {
                pip: "20-25 cmH2O", peep: "5 cmH2O", fio2_pre: "21-30%", fio2_term: "21%", flow: "10 L/min"
            }
        };

        function App() {
            const [gameState, setGameState] = useState('menu');
            const [currentCase, setCurrentCase] = useState(null);
            const [guidedMode, setGuidedMode] = useState(true); 
            
            const [timer, setTimer] = useState(0);
            const [vitals, setVitals] = useState({ hr: 0, spo2: 0 });
            const [logs, setLogs] = useState([]);
            const [rhythmMsg, setRhythmMsg] = useState("");
            const [procModal, setProcModal] = useState(null);
            const [assistantHint, setAssistantHint] = useState("");
            
            const [selectedEquip, setSelectedEquip] = useState([]);
            const [askedBriefing, setAskedBriefing] = useState([]);
            const [askedBirth, setAskedBirth] = useState([]);

            const [mode, setMode] = useState('neopuff'); 
            const [pip, setPip] = useState(20);
            const [fio2, setFio2] = useState(21);
            const [flow, setFlow] = useState(10);
            const [isVPPActive, setIsVPPActive] = useState(false);
            const [ventCount, setVentCount] = useState(0);

            // STATE REF EXTENDIDO
            const timerRef = useRef(null);
            const stateRef = useRef({
                hr: 0, spo2: 0, mode: 'neopuff', pip: 20, flow: 10, 
                sopaSteps: [], thermalActions: [], drugs: [], equips: [], lastVentTime: 0,
                stableTimer: 0, timer: 0, timestamps: {} 
            });

            useEffect(() => {
                stateRef.current.mode = mode;
                stateRef.current.pip = pip;
                stateRef.current.flow = flow;
                stateRef.current.equips = selectedEquip;
            }, [mode, pip, flow, selectedEquip]);

            // --- LÓGICA DE ASISTENTE GUIADO ---
            useEffect(() => {
                if (!guidedMode || gameState !== 'resus') return;
                const { hr, spo2, thermalActions, sopaSteps, drugs, mode, timestamps } = stateRef.current;
                
                if (timer < 30) {
                    if (currentCase.eg < 32 && (!thermalActions.includes('bolsa_poli') || !thermalActions.includes('gorro'))) {
                        setAssistantHint("PASO 1: Es prematuro extremo. Usa BOLSA POLI y GORRO inmediatamente. NO lo seques.");
                    } else if (!thermalActions.includes('posicionar') || !thermalActions.includes('aspirar')) {
                        setAssistantHint("PASO 1: Pasos iniciales (Olfateo, Aspirar secreciones si es necesario).");
                    } else {
                        setAssistantHint("Evaluación Inicial completada. Revisa FC y esfuerzo respiratorio.");
                    }
                } else if (hr < 100 && timer >= 30) {
                    if (mode === 'apagado' || mode === 'freeflow') {
                        setAssistantHint("PASO 2: FC < 100 lpm. Selecciona NeoPuff o Ambu y prepárate para ventilar.");
                    } else if (sopaSteps.length === 0 && ventCount > 10) {
                        setAssistantHint("PASO 3: VPP inefectiva. Aplica pasos de MR. SOPA para corregir sello y vía aérea.");
                    } else if (hr < 60 && timer > 90) {
                        setAssistantHint("PASO 4: FC < 60. Considera Intubación, Catéter Umbilical y Adrenalina.");
                    } else {
                        setAssistantHint("PASO 2: Inicia VPP rítmica (Ventila... dos... tres...) con el botón azul.");
                    }
                } else if (hr >= 100) {
                    if (currentCase.eg < 32 && !drugs.includes('surfactante')) {
                        setAssistantHint("PASO 5: Excelente. Paciente estabilizado pero pulmón inmaduro. Administra Surfactante.");
                    } else if (mode !== 'apagado') {
                        setAssistantHint("¡LOGRADO! Signos vitales estables. Cambia el modo a 'Apagado' para evaluar respiración espontánea y finalizar la reanimación.");
                    } else {
                        setAssistantHint("Evaluando respiración espontánea. Mantén el modo 'Apagado' unos segundos para confirmar.");
                    }
                }
            }, [timer, guidedMode, gameState, currentCase, ventCount]);

            // --- MOTOR DE SIMULACIÓN ---
            useEffect(() => {
                if (gameState === 'resus') {
                    stateRef.current.hr = currentCase.hr;
                    stateRef.current.spo2 = currentCase.spo2;
                    stateRef.current.stableTimer = 0;
                    setVitals({ hr: currentCase.hr, spo2: currentCase.spo2 });

                    timerRef.current = setInterval(() => {
                        setTimer(prevT => {
                            const nt = prevT + 1;
                            stateRef.current.timer = nt; 
                            if (nt === 30 && !guidedMode) addLog("[!] ALERTA 30s: Evaluar FC.", "alert");
                            if (nt === 60 && !guidedMode) addLog("[!] MINUTO DE ORO.", "alert");
                            return nt;
                        });

                        const now = Date.now();
                        const { hr, spo2, mode, pip, flow, sopaSteps, thermalActions, drugs, equips, lastVentTime } = stateRef.current;
                        
                        const isActivelyVenting = (now - lastVentTime) < 2500 && (mode === 'neopuff' || mode === 'ambu');

                        let hrChange = -0.5; 
                        let spo2Change = -0.5;

                        // Castigos de Temperatura
                        if (currentCase.eg < 32) {
                            if (thermalActions.includes('secar')) hrChange -= 1.0; 
                            if (!thermalActions.includes('bolsa_poli')) hrChange -= 0.5;
                        }

                        if (isActivelyVenting) {
                            if (flow < 8 && mode === 'neopuff') {
                                hrChange -= 1.0; 
                            } else {
                                let effective = false;
                                if (currentCase.eg < 32) {
                                    if (pip >= 25 || sopaSteps.includes('P') || sopaSteps.includes('A')) effective = true;
                                } else {
                                    effective = true;
                                }

                                if (effective) {
                                    hrChange = 2.0; 
                                    spo2Change = 1.0;
                                    if (currentCase.eg < 32 && drugs.includes('surfactante')) hrChange += 1.5; 
                                    if (drugs.includes('adrenalina') && equips.includes('cateter_umb')) hrChange += 3.0;
                                } else {
                                    hrChange = 0; 
                                    spo2Change = 0;
                                }
                            }
                        } else if (mode === 'freeflow') {
                            hrChange = -0.2; 
                            spo2Change = 0.2;
                        } else if (mode === 'apagado') {
                            if (hr >= 100 && spo2 >= 85) {
                                if (currentCase.eg < 32 && !drugs.includes('surfactante')) {
                                    hrChange = -1.0; 
                                } else {
                                    hrChange = 0; 
                                    spo2Change = 0.1;
                                    stateRef.current.stableTimer += 1;
                                }
                            } else {
                                hrChange = -1.5; 
                                spo2Change = -1.0;
                                stateRef.current.stableTimer = 0;
                            }
                        }

                        const newHr = Math.max(0, Math.min(160, hr + hrChange));
                        const newSpo2 = Math.max(0, Math.min(98, spo2 + spo2Change));

                        stateRef.current.hr = newHr;
                        stateRef.current.spo2 = newSpo2;
                        setVitals({ hr: Math.floor(newHr), spo2: Math.floor(newSpo2) });

                        if (newHr === 0) setGameState('fail');
                        
                        if (stateRef.current.stableTimer >= 4 && stateRef.current.timer > 60) {
                            setGameState('success');
                        }

                    }, 1000);
                } else {
                    clearInterval(timerRef.current);
                }
                return () => clearInterval(timerRef.current);
            }, [gameState, currentCase, guidedMode]);

            const addLog = (m, status = 'info') => {
                const icons = { info: '🔹', correct: '✅', error: '❌', alert: '🔔', late: '⏰', warn: '⚠️' };
                setTimer(currentT => {
                    setLogs(prev => [{ t: formatTime(currentT), m, icon: icons[status], status }, ...prev]);
                    return currentT;
                });
            };

            const formatTime = (s) => `${Math.floor(s/60)}:${(s%60).toString().padStart(2,'0')}`;

            const markTimestamp = (action) => {
                if (!stateRef.current.timestamps[action]) {
                    stateRef.current.timestamps[action] = stateRef.current.timer;
                }
            };

            const handleVentilation = () => {
                if (mode === 'freeflow' || mode === 'apagado') return;
                const now = Date.now();
                const diff = (now - stateRef.current.lastVentTime) / 1000;
                
                stateRef.current.lastVentTime = now;
                setVentCount(c => c + 1);
                setIsVPPActive(true);
                markTimestamp('vpp_start'); 

                if (stateRef.current.lastVentTime !== 0 && diff > 0.1) {
                    if (diff < 0.8) { setRhythmMsg("¡RÁPIDO!"); if(!guidedMode) addLog("Ritmo muy rápido.", "error"); }
                    else if (diff > 2.8) { setRhythmMsg("LENTO..."); if(!guidedMode) addLog("Ritmo insuficiente.", "late"); }
                    else setRhythmMsg("RITMO CORRECTO");
                }
                setTimeout(() => { setIsVPPActive(false); setRhythmMsg(""); }, 300);
            };

            const registerAction = (type, value) => {
                markTimestamp(value);
                if (type === 'thermal') {
                    if (!stateRef.current.thermalActions.includes(value)) {
                        stateRef.current.thermalActions.push(value);
                        if (value === 'secar' && currentCase.eg < 32) addLog("ERROR CRÍTICO: Prematuros menores de 32 semanas NO se secan.", "error");
                        else addLog(`Paso: ${value.replace('_', ' ')} realizado.`, 'correct');
                    }
                } else if (type === 'sopa') {
                    if (!stateRef.current.sopaSteps.includes(value)) {
                        stateRef.current.sopaSteps.push(value);
                        addLog(`MR SOPA [${value}] ejecutado.`, 'correct');
                    }
                } else if (type === 'drug') {
                    if (!stateRef.current.drugs.includes(value)) {
                        stateRef.current.drugs.push(value);
                        addLog(`Fármaco: ${value} administrado.`, 'correct');
                    }
                }
            };

            const startGame = () => {
                const c = CASES[Math.floor(Math.random() * CASES.length)];
                setCurrentCase(c);
                setGameState('vignette');
                setTimer(0);
                setLogs([]);
                setSelectedEquip([]);
                setAskedBriefing([]);
                setAskedBirth([]);
                setVentCount(0);
                setAssistantHint("");
                stateRef.current = { 
                    hr: c.hr, spo2: c.spo2, mode: 'neopuff', pip: 20, flow: 10, 
                    sopaSteps: [], thermalActions: [], drugs: [], equips: [], 
                    lastVentTime: 0, stableTimer: 0, timer: 0, timestamps: {} 
                };
            };

            const WaveMonitor = ({ color }) => (
                <div className="wave-container">
                    <svg className="wave-svg" viewBox="0 0 200 40"><path className="wave" d="M0,20 L10,20 L15,5 L20,35 L25,20 L50,20 L60,20 L65,5 L70,35 L75,20 L100,20" stroke={color} fill="transparent" strokeWidth="2" strokeLinejoin="round" /></svg>
                </div>
            );

            // --- RÚBRICA ECOE ---
            const Debriefing = () => {
                const t = stateRef.current.timestamps;
                const actions = stateRef.current.thermalActions;
                const isPremature = currentCase.eg < 32;
                
                const rubric = [];

                if (isPremature) {
                    if (actions.includes('secar')) {
                        rubric.push({ text: "Error: Secaste a un prematuro menor de 32 semanas. Causa hipotermia severa por evaporación.", pass: false });
                    }
                    if (t['bolsa_poli'] && t['bolsa_poli'] <= 45) {
                        rubric.push({ text: `Excelente: Uso precoz de Bolsa de Polietileno (${formatTime(t['bolsa_poli'])}).`, pass: true });
                    } else if (t['bolsa_poli']) {
                        rubric.push({ text: `Tardío: Bolsa de Polietileno aplicada tarde (${formatTime(t['bolsa_poli'])}). Ideal antes de los 40s.`, pass: 'partial' });
                    } else {
                        rubric.push({ text: "Falta Crítica: No usaste Bolsa de Polietileno en prematuro extremo.", pass: false });
                    }
                } else {
                    if (t['secar'] && t['secar'] <= 40) rubric.push({ text: `Pasos Iniciales: Secado adecuado a tiempo (${formatTime(t['secar'])}).`, pass: true });
                    else rubric.push({ text: "Pasos Iniciales: Retraso u omisión en secado/estimulación.", pass: false });
                }

                if (t['posicionar'] && t['posicionar'] <= 50) rubric.push({ text: `Vía Aérea: Posición de olfateo temprana (${formatTime(t['posicionar'])}).`, pass: true });
                else rubric.push({ text: "Vía Aérea: Retraso en permeabilizar vía aérea (Olfateo).", pass: 'partial' });

                if (t['vpp_start']) {
                    if (t['vpp_start'] <= 75) rubric.push({ text: `Minuto de Oro: VPP iniciada a tiempo (${formatTime(t['vpp_start'])}).`, pass: true });
                    else rubric.push({ text: `Minuto de Oro: VPP tardía (${formatTime(t['vpp_start'])}). Riesgo de hipoxia prolongada.`, pass: false });
                } else {
                    rubric.push({ text: "Falta Crítica: No se administró Presión Positiva (VPP).", pass: false });
                }

                if (t['P'] || t['A']) {
                    rubric.push({ text: "Corrección: Uso adecuado de pasos avanzados de MR. SOPA.", pass: true });
                }

                if (isPremature) {
                    if (t['surfactante']) rubric.push({ text: `Manejo SDR: Surfactante administrado correctamente.`, pass: true });
                    else rubric.push({ text: "Manejo SDR: Se omitió administración de Surfactante esencial.", pass: false });
                }

                if (stateRef.current.mode === 'apagado' && gameState === 'success') {
                    rubric.push({ text: "Auditoría Clínica: Se confirmó respiración espontánea apagando el soporte.", pass: true });

                                        {id:'S', n:'Succión', d:'Boca y luego nariz.'}, {id:'O', n:'Open (Boca Abierta)', d:'Levantar mandíbula.'},
                                        {id:'P', n:'Presión', d:'Aumentar PIP gradualmente a 25-30.'},
                                        {id:'A', n:'Vía Alternativa', d:'Preparar Intubación.'}
                                    ].map(it => (
                                        <button key={it.id} onClick={() => registerAction('sopa', it.id)} className={`flex items-center gap-4 w-full p-4 rounded-3xl border-2 transition-all ${stateRef.current.sopaSteps.includes(it.id) ? 'bg-emerald-50 border-emerald-500 shadow-inner' : 'bg-slate-50 border-slate-100 hover:bg-slate-100 shadow-md'}`}>
                                            <span className={`w-12 h-12 rounded-2xl flex items-center justify-center font-black text-xl ${stateRef.current.sopaSteps.includes(it.id) ? 'bg-emerald-500 text-white shadow-lg' : 'bg-slate-200 text-slate-500'}`}>{it.id}</span>
                                            <div className="text-left"><p className="text-sm font-bold text-slate-900 leading-none mb-1">{it.n}</p><p className="text-[10px] text-slate-400 leading-tight">{it.d}</p></div>
                                        </button>
                                    ))}
                                </div>
                                <button onClick={() => setProcModal(null)} className="w-full mt-10 bg-slate-900 text-white py-5 rounded-3xl font-black uppercase tracking-widest shadow-xl">Cerrar y Re-evaluar VPP</button>
                            </div>
                        </div>
                    )}

                    {procModal === 'advanced' && (
                        <div className="fixed inset-0 z-[100] bg-black/95 flex items-center justify-center p-6 text-slate-100">
                            <div className="bg-slate-900 p-10 rounded-[3rem] border border-slate-800 max-w-2xl w-full shadow-2xl">
                                <div className="flex justify-between items-center mb-10">
                                    <h3 className="text-2xl font-black uppercase tracking-widest text-blue-400">Vía Aérea Avanzada</h3>
                                    <button onClick={()=>setProcModal(null)} className="text-rose-500 font-bold uppercase text-xs">Cerrar</button>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-8 text-left">
                                    <div className="space-y-4">
                                        <p className="text-[10px] font-black text-blue-500 uppercase border-b border-blue-900/50 pb-2 tracking-widest">Opción A: Intubación ET</p>
                                        <button disabled={!selectedEquip.includes('laringo')} onClick={() => addLog("Visualizo glotis con laringoscopio.", "correct")} className="w-full p-4 bg-slate-800 rounded-2xl text-[10px] font-bold uppercase hover:bg-blue-600 disabled:opacity-30 shadow-lg">1. Colocar Laringo</button>
                                        <div className="flex gap-2">
                                            {['tubo_25', 'tubo_30', 'tubo_35'].map(t => (
                                                <button key={t} disabled={!selectedEquip.includes(t)} onClick={() => { registerAction('sopa', 'A'); addLog(`Tubo ${t.split('_')[1]} insertado.`, "correct"); }} className="flex-1 p-3 bg-slate-800 rounded-xl text-[9px] font-bold uppercase hover:bg-blue-600 disabled:opacity-30">T.{t.split('_')[1]}</button>
                                            ))}
                                        </div>
                                        <button onClick={() => addLog("Tubo fijado y verificado.", "correct")} className="w-full p-4 bg-slate-800 rounded-2xl text-[10px] font-bold uppercase hover:bg-blue-600 shadow-lg">3. Fijar Tubo</button>
                                    </div>
                                    <div className="space-y-4">
                                        <p className="text-[10px] font-black text-amber-500 uppercase border-b border-amber-900/50 pb-2 tracking-widest">Opción B: Máscara Laríngea</p>
                                        <button disabled={!selectedEquip.includes('ml')} onClick={() => { registerAction('sopa', 'A'); addLog("Máscara Laríngea insertada y sellada.", "correct"); }} className="w-full p-4 bg-slate-800 rounded-2xl text-[10px] font-bold uppercase hover:bg-amber-600 disabled:opacity-30 shadow-lg">Insertar M. Laríngea</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );

            if (gameState === 'fail') return (
                <div className="min-h-screen flex items-center justify-center p-8 bg-slate-950">
                    <div className="bg-slate-900 p-12 rounded-[4rem] border-4 border-rose-600 max-w-2xl w-full shadow-2xl">
                        <h2 className="text-4xl font-black mb-6 uppercase text-rose-500 tracking-tighter text-center">Fallecimiento Neonatal</h2>
                        <p className="text-slate-400 mb-6 leading-relaxed text-lg text-center">El paciente no logró estabilizarse en el tiempo crítico.</p>
                        <Debriefing />
                        <button onClick={() => setGameState('menu')} className="w-full mt-8 bg-slate-800 hover:bg-slate-700 text-white py-6 rounded-3xl font-black uppercase tracking-widest transition-all">Volver al Menú</button>
                    </div>
                </div>
            );

            if (gameState === 'success') return (
                <div className="min-h-screen flex items-center justify-center p-8 bg-slate-950">
                    <div className="bg-slate-900 p-12 rounded-[4rem] border-4 border-emerald-600 max-w-2xl w-full shadow-2xl">
                        <h2 className="text-4xl font-black mb-6 uppercase text-emerald-500 tracking-tighter text-center">Reanimación Exitosa</h2>
                        <p className="text-slate-400 mb-6 leading-relaxed text-lg text-center">Paciente estabilizado con respiración espontánea.</p>
                        <Debriefing />
                        <button onClick={() => setGameState('menu')} className="w-full mt-8 bg-emerald-600 hover:bg-emerald-500 text-white py-6 rounded-3xl font-black uppercase tracking-widest shadow-xl shadow-emerald-900/20 transition-all">Finalizar Guardia</button>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
