<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeoResus Master Pro - Alta Fidelidad</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #020617; color: #f8fafc; overflow-x: hidden; }
        .monitor-font { font-family: 'JetBrains Mono', monospace; }
        .pulse-red { animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; border-color: #ef4444; } 50% { opacity: 0.5; border-color: #7f1d1d; } }
        
        .monitor-screen { position: relative; overflow: hidden; background: transparent; }
        .wave-container { height: 40px; width: 100%; overflow: hidden; position: relative; margin-top: 5px; }
        .wave-svg { position: absolute; width: 200%; height: 100%; left: 0; }
        @keyframes sweep { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

        input[type=range] { -webkit-appearance: none; background: transparent; width: 100%; }
        input[type=range]::-webkit-slider-runnable-track { height: 6px; background: #1e293b; border-radius: 10px; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 18px; width: 18px; border-radius: 50%; background: #3b82f6; cursor: pointer; margin-top: -6px; border: 2px solid #fff; }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        
        .setup-tool { filter: grayscale(1); transition: all 0.4s; }
        .setup-tool.active { filter: grayscale(0); transform: scale(1.02); border-color: #3b82f6; box-shadow: 0 0 20px rgba(59, 130, 246, 0.2); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- DATOS Y EQUIPOS ---
        const EQUIPMENT_CART = [
            { category: "1. Termorregulación", items: [
                { id: 'cuna', name: 'Cuna Radiante', correct: true },
                { id: 'bolsa_poli', name: 'Bolsa Polietileno', correct: true },
                { id: 'gorro', name: 'Gorro lana', correct: true },
                { id: 'term_rectal', name: 'Termómetro Rectal', correct: false }
            ]},
            { category: "2. Ventilación y Oxígeno", items: [
                { id: 'neopuff', name: 'NeoPuff', correct: true },
                { id: 'ambu', name: 'Ambu con reservorio', correct: true },
                { id: 'mascara_0', name: 'Máscara #0', correct: true },
                { id: 'mascara_1', name: 'Máscara #1', correct: true },
                { id: 'blender', name: 'Mezclador FiO2', correct: true }
            ]},
            { category: "3. Vía Aérea Avanzada", items: [
                { id: 'laringo', name: 'Laringoscopio', correct: true },
                { id: 'ml', name: 'Máscara Laríngea', correct: true },
                { id: 'tubo_25', name: 'Tubo ET 2.5', correct: true },
                { id: 'tubo_30', name: 'Tubo ET 3.0', correct: true }, 
                { id: 'tubo_35', name: 'Tubo ET 3.5', correct: true }, 
                { id: 'tubo_40', name: 'Tubo ET 4.0', correct: true }
            ]},
            { category: "4. Drogas y Accesos", items: [
                { id: 'surfactante', name: 'Surfactante', correct: true },
                { id: 'adrenalina', name: 'Adrenalina 1:10k', correct: true },
                { id: 'sf', name: 'Suero Fisiológico', correct: true },
                { id: 'umbilical', name: 'Catéter Umbilical', correct: true }
            ]},
            { category: "5. Monitorización", items: [
                { id: 'steto', name: 'Estetoscopio', correct: true },
                { id: 'spo2', name: 'Saturómetro', correct: true }
            ]}
        ];

        const CASES = [
            { id: 1, title: "Prematuro 27s - SDR Severo", vignette: "27 semanas. Sin corticoides antenatales. Líquido claro. Expulsivo inminente.", eg: 27, liq: "Claro", hr: 70, spo2: 45, tone: "Flácido", cry: "Apnea" },
            { id: 2, title: "SAM Severo - Post término", vignette: "41 semanas. Monitor fetal con bradicardia mantenida. Líquido meconial espeso.", eg: 41, liq: "Meconial", hr: 55, spo2: 35, tone: "Pobre", cry: "Jadeo" }
        ];

        function App() {
            const [gameState, setGameState] = useState('menu');
            const [currentCase, setCurrentCase] = useState(null);
            
            // UI States
            const [timer, setTimer] = useState(0);
            const [vitals, setVitals] = useState({ hr: 0, spo2: 0 });
            const [logs, setLogs] = useState([]);
            const [rhythmMsg, setRhythmMsg] = useState("");
            const [procModal, setProcModal] = useState(null);
            
            // Flow States
            const [selectedEquip, setSelectedEquip] = useState([]);
            const [askedBriefing, setAskedBriefing] = useState([]);
            const [askedBirth, setAskedBirth] = useState([]);
            
            // Setup Pre-Arrival States
            const [setupStatus, setSetupStatus] = useState({ heat: false, blender: 21, suction: false });
            const [preArrivalTimer, setPreArrivalTimer] = useState(20);

            // Interfaz de Reanimación
            const [mode, setMode] = useState('neopuff');
            const [pip, setPip] = useState(20);
            const [fio2, setFio2] = useState(21);
            const [flow, setFlow] = useState(10);
            const [isMaskSealed, setIsMaskSealed] = useState(false);
            const [isVPPActive, setIsVPPActive] = useState(false);
            const [ventCount, setVentCount] = useState(0);

            // --- REFS PARA MOTOR FÍSICO Y TIEMPO REAL ---
            const timerRef = useRef(null);

            // FIX #1 y #3: Ref unificado que refleja SIEMPRE el estado actual
            // de todas las variables que el motor de simulación necesita leer.
            // Esto evita el problema de closures stale en setInterval.
            const stateRef = useRef({
                hr: 0, spo2: 0, mode: 'neopuff', pip: 20, flow: 10,
                isMaskSealed: false,  // FIX #3: agregado al ref
                timerValue: 0,        // FIX #2: timer como ref para condición de éxito
                sopaSteps: [], thermalActions: [], drugs: [], equips: [], lastVentTime: 0
            });

            // Sincronizar UI con Refs — ahora incluye isMaskSealed
            useEffect(() => {
                stateRef.current.mode = mode;
                stateRef.current.pip = pip;
                stateRef.current.flow = flow;
                stateRef.current.equips = selectedEquip;
            }, [mode, pip, flow, selectedEquip]);

            // FIX #3: Sincronizar isMaskSealed al ref cada vez que cambia
            useEffect(() => {
                stateRef.current.isMaskSealed = isMaskSealed;
            }, [isMaskSealed]);

            // --- LÓGICA DE TIEMPO PRE-ARRIVAL ---
            useEffect(() => {
                if (gameState === 'setup') {
                    if (preArrivalTimer > 0) {
                        const t = setInterval(() => setPreArrivalTimer(p => p - 1), 1000);
                        return () => clearInterval(t);
                    } else {
                        setFio2(setupStatus.blender);
                        setGameState('birth');
                    }
                }
            }, [gameState, preArrivalTimer]);

            // --- MOTOR DE SIMULACIÓN PRINCIPAL ---
            useEffect(() => {
                if (gameState === 'resus') {
                    stateRef.current.hr = currentCase.hr;
                    stateRef.current.spo2 = currentCase.spo2;
                    stateRef.current.timerValue = 0; // FIX #2: resetear timer ref
                    setVitals({ hr: currentCase.hr, spo2: currentCase.spo2 });

                    timerRef.current = setInterval(() => {
                        // FIX #2: Incrementar timerValue en el ref además del estado React
                        stateRef.current.timerValue += 1;
                        const nt = stateRef.current.timerValue;

                        setTimer(nt);
                        if (nt === 30) addLog("[!] ALERTA 30s: Evaluar FC y respiración.", "alert");
                        if (nt === 60) addLog("[!] MINUTO DE ORO: Si FC < 100, iniciar VPP efectiva.", "alert");

                        const now = Date.now();

                        // FIX #1 y #3: Leer SIEMPRE desde stateRef para evitar closures stale
                        const {
                            hr, spo2, mode, pip, flow,
                            isMaskSealed: maskSealed,  // FIX #3: leer del ref
                            sopaSteps, thermalActions, drugs, equips, lastVentTime
                        } = stateRef.current;

                        const isActivelyVenting = (now - lastVentTime) < 2500
                            && mode !== 'freeflow'
                            && maskSealed; // FIX #3: usar valor del ref

                        let hrChange = -1.0;
                        let spo2Change = -0.5;

                        // Penalizaciones térmicas (Prematuros)
                        if (currentCase.eg < 32) {
                            if (thermalActions.includes('secar')) hrChange -= 1.5; 
                            if (!thermalActions.includes('bolsa_poli') || !thermalActions.includes('gorro')) hrChange -= 0.8;
                        }

                        // Efectividad de VPP
                        if (isActivelyVenting) {
                            if (flow < 8) {
                                hrChange -= 1.0; 
                            } else {
                                let effective = false;
                                if (currentCase.eg < 32) {
                                    if (pip >= 25 || sopaSteps.includes('P') || sopaSteps.includes('A')) effective = true;
                                } else {
                                    effective = true; 
                                }

                                if (effective) {
                                    hrChange = 2.5; 
                                    spo2Change = 1.0;
                                    if (currentCase.eg < 32 && drugs.includes('surfactante')) hrChange += 2.0; 
                                    if (drugs.includes('adrenalina') && equips.includes('umbilical')) hrChange += 3.0;
                                } else {
                                    hrChange = 0; 
                                    spo2Change = 0;
                                }
                            }
                        } else if (mode === 'freeflow') {
                            hrChange = -0.3; 
                            spo2Change = 0.2;
                        }

                        // Calcular nuevos vitales y escribirlos al ref (FIX #1)
                        const newHr = Math.max(0, Math.min(160, hr + hrChange));
                        const newSpo2 = Math.max(0, Math.min(98, spo2 + spo2Change));

                        stateRef.current.hr = newHr;
                        stateRef.current.spo2 = newSpo2;
                        
                        setVitals({ hr: Math.floor(newHr), spo2: Math.floor(newSpo2) });

                        if (newHr === 0) setGameState('fail');

                        // FIX #2: Usar stateRef.current.timerValue en lugar de stateRef.current.timer
                        if (newHr > 110 && newSpo2 > 85 && stateRef.current.timerValue > 60) setGameState('success');

                    }, 1000);
                } else {
                    clearInterval(timerRef.current);
                }
                return () => clearInterval(timerRef.current);
            }, [gameState, currentCase]);

            const addLog = (m, status = 'info') => {
                const icons = { info: '🔹', correct: '✅', error: '❌', alert: '🔔', late: '⏰', warn: '⚠️' };
                setLogs(prev => [{ t: formatTime(stateRef.current.timerValue), m, icon: icons[status], status }, ...prev]);
            };

            const formatTime = (s) => `${Math.floor(s/60)}:${(s%60).toString().padStart(2,'0')}`;

            const handleVentilation = () => {
                if (mode === 'freeflow' || mode === 'apagado') return;
                
                if (!isMaskSealed) {
                    setRhythmMsg("¡SELLA LA MÁSCARA!");
                    return;
                }

                const now = Date.now();
                const diff = (now - stateRef.current.lastVentTime) / 1000;
                
                stateRef.current.lastVentTime = now;
                setVentCount(c => c + 1);
                setIsVPPActive(true);

                if (stateRef.current.lastVentTime !== 0 && diff > 0.1) {
                    if (diff < 0.8) { setRhythmMsg("¡RÁPIDO!"); addLog("Ritmo de VPP muy rápido.", "error"); }
                    else if (diff > 2.5) { setRhythmMsg("LENTO..."); addLog("Ritmo de VPP insuficiente.", "late"); }
                    else setRhythmMsg("RITMO CORRECTO");
                }
                setTimeout(() => { setIsVPPActive(false); setRhythmMsg(""); }, 300);
            };

            const registerAction = (type, value) => {
                if (type === 'thermal') {
                    if (!stateRef.current.thermalActions.includes(value)) {
                        stateRef.current.thermalActions.push(value);
                        if (value === 'secar' && currentCase.eg < 32) addLog("ERROR CRÍTICO: Prematuros menores de 32 semanas no se secan (Hipotermia).", "error");
                        else addLog(`Acción: ${value} realizado.`, 'correct');
                    }
                } else if (type === 'sopa') {
                    if (!stateRef.current.sopaSteps.includes(value)) {
                        stateRef.current.sopaSteps.push(value);
                        addLog(`MR SOPA [${value}] ejecutado.`, 'correct');
                    }
                } else if (type === 'drug') {
                    if (!stateRef.current.drugs.includes(value)) {
                        stateRef.current.drugs.push(value);
                        addLog(`Fármaco administrado: ${value}.`, 'correct');
                    }
                }
            };

            const startGame = () => {
                const c = CASES[Math.floor(Math.random() * CASES.length)];
                setCurrentCase(c);
                setGameState('vignette');
                setTimer(0);
                setLogs([]);
                setSelectedEquip([]);
                setAskedBriefing([]);
                setAskedBirth([]);
                setVentCount(0);
                setPreArrivalTimer(20);
                setIsMaskSealed(false);
                stateRef.current = {
                    hr: c.hr, spo2: c.spo2, mode: 'neopuff', pip: 20, flow: 10,
                    isMaskSealed: false,
                    timerValue: 0,
                    sopaSteps: [], thermalActions: [], drugs: [], equips: [], lastVentTime: 0
                };
            };

            // --- COMPONENTE DE ONDAS DINÁMICAS ---
            const WaveMonitor = ({ type, active, hr, spo2 }) => {
                if (!active || hr === 0) {
                    return (
                        <div className="wave-container monitor-screen border-t border-b border-white/5">
                            <svg className="wave-svg" style={{ animationPlayState: 'paused' }} viewBox="0 0 200 40">
                                <path d="M0,20 L200,20" stroke="#334155" strokeWidth="2" fill="none" />
                            </svg>
                        </div>
                    );
                }

                const duration = hr > 0 ? (60 / hr) : 0;
                const animationStyle = { animation: `sweep ${duration}s linear infinite` };
                const plethScale = type === 'pleth' ? Math.max(0.1, spo2 / 100) : 1;

                const ecgPath = "M0,20 L10,20 Q15,15 20,20 L25,20 L28,25 L32,5 L36,35 L40,20 L55,20 Q65,10 75,20 L100,20 L110,20 Q115,15 120,20 L125,20 L128,25 L132,5 L136,35 L140,20 L155,20 Q165,10 175,20 L200,20";
                const plethPath = "M0,35 C10,35 15,5 25,5 C30,5 35,20 40,15 C45,20 50,35 100,35 C110,35 115,5 125,5 C130,5 135,20 140,15 C145,20 150,35 200,35";

                return (
                    <div className="wave-container monitor-screen border-t border-b border-white/5">
                        <svg className="wave-svg" style={animationStyle} viewBox="0 0 200 40" preserveAspectRatio="none">
                            <g transform={type === 'pleth' ? `translate(0, 35) scale(1, ${plethScale}) translate(0, -35)` : ''}>
                                <path d={type === 'ecg' ? ecgPath : plethPath} stroke={type === 'ecg' ? "#10b981" : "#38bdf8"} strokeWidth="2" fill="none" strokeLinejoin="round" />
                            </g>
                        </svg>
                    </div>
                );
            };

            // --- VISTAS DE LA APLICACIÓN ---
            if (gameState === 'menu') return (
                <div className="min-h-screen flex flex-col items-center justify-center p-8 text-center">
                    <div className="bg-blue-600 p-8 rounded-[3rem] shadow-2xl mb-8 scale-110">
                        <svg width="50" height="50" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="3"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                    </div>
                    <h1 className="text-4xl font-black mb-2 uppercase tracking-tighter text-white">NeoResus Master Pro</h1>
                    <p className="text-slate-500 mb-12 italic max-w-xs text-sm">Simulador ECOE - Alta Fidelidad 2026</p>
                    <button onClick={startGame} className="bg-blue-600 hover:bg-blue-500 py-6 px-20 rounded-[2rem] font-black uppercase tracking-widest shadow-xl active:scale-95 transition-all">Iniciar Guardia</button>
                </div>
            );

            if (gameState === 'vignette') return (
                <div className="min-h-screen flex items-center justify-center p-6 bg-slate-950">
                    <div className="bg-slate-900 p-12 rounded-[4rem] border border-slate-800 max-w-xl w-full shadow-2xl">
                        <span className="text-[10px] font-black text-blue-500 uppercase tracking-widest mb-6 block underline underline-offset-4">Recepción Urgente</span>
                        <h2 className="text-3xl font-black mb-6 leading-tight text-white">{currentCase.title}</h2>
                        <p className="text-slate-300 text-lg leading-relaxed mb-12 italic border-l-4 border-blue-600 pl-6">"{currentCase.vignette}"</p>
                        <button onClick={() => setGameState('briefing')} className="w-full bg-blue-600 py-5 rounded-2xl font-black uppercase tracking-widest shadow-lg">Asistir al Parto</button>
                    </div>
                </div>
            );

            if (gameState === 'briefing') return (
                <div className="min-h-screen p-6 max-w-xl mx-auto flex flex-col justify-center">
                    <h2 className="text-2xl font-black text-center mb-10 uppercase tracking-widest text-blue-400">1. Briefing Obstétrico</h2>
                    <div className="grid gap-3">
                        {[
                            { id:'eg', q:'¿Cuál es la edad gestacional?', a:currentCase.eg + ' semanas' },
                            { id:'liq', q:'¿Cómo está el líquido amniótico?', a:currentCase.liq },
                            { id:'riesgo', q:'¿Algún factor de riesgo adicional?', a:'Alta probabilidad de depresión.' },
                            { id:'cord', q:'¿Cuál es el plan para el cordón?', a:'Clampeo según vigor al nacer.' }
                        ].map(it => (
                            <button key={it.id} onClick={() => !askedBriefing.includes(it.id) && setAskedBriefing(p => [...p, it.id])} className={`p-6 rounded-[2rem] border-2 text-left relative overflow-hidden transition-all ${askedBriefing.includes(it.id) ? 'border-blue-500 bg-blue-500/10 shadow-inner' : 'border-slate-800 bg-slate-900 shadow-lg'}`}>
                                <p className="text-[10px] font-black text-blue-400 uppercase mb-1">{it.q}</p>
                                <p className={`font-bold transition-all text-white ${askedBriefing.includes(it.id) ? 'opacity-100' : 'opacity-0'}`}>{it.a}</p>
                                {!askedBriefing.includes(it.id) && <div className="absolute inset-0 flex items-center justify-center bg-slate-900/80 backdrop-blur-sm text-[10px] font-black text-slate-500 uppercase tracking-widest">Interrogar</div>}
                            </button>
                        ))}
                    </div>
                    <button disabled={askedBriefing.length < 4} onClick={() => setGameState('prep')} className="w-full mt-10 bg-white text-black font-black py-5 rounded-3xl disabled:opacity-20 uppercase tracking-widest shadow-xl">Revisar Carro de Paro</button>
                </div>
            );

            if (gameState === 'prep') return (
                <div className="min-h-screen p-6 max-w-4xl mx-auto pb-48">
                    <h2 className="text-2xl font-black text-center mb-10 uppercase text-blue-400 tracking-tighter">2. Preparación de Materiales</h2>
                    {EQUIPMENT_CART.map((cat, ci) => (
                        <div key={ci} className="mb-8">
                            <h3 className="text-[11px] font-black text-slate-500 uppercase mb-4 tracking-widest px-2 border-l-4 border-blue-600">{cat.category}</h3>
                            <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
                                {cat.items.map(it => {
                                    const sel = selectedEquip.includes(it.id);
                                    return (
                                        <button key={it.id} onClick={() => setSelectedEquip(p => sel ? p.filter(x => x !== it.id) : [...p, it.id])} className={`p-4 rounded-2xl border-2 transition-all flex flex-col items-center justify-center gap-2 ${sel ? 'border-emerald-500 bg-emerald-500/10 text-white shadow-lg' : 'border-slate-800 bg-slate-900 text-slate-600'}`}>
                                            <span className="text-[9px] font-black uppercase text-center leading-tight">{it.name}</span>
                                        </button>
                                    );
                                })}
                            </div>
                        </div>
                    ))}
                    <div className="fixed bottom-0 left-0 right-0 p-8 bg-slate-900 border-t border-slate-800 max-w-4xl mx-auto rounded-t-[3rem] z-50 shadow-2xl">
                        <button onClick={() => setGameState('setup')} className="w-full bg-emerald-600 py-5 rounded-[2rem] font-black uppercase shadow-xl tracking-widest active:scale-95 transition-all">Confirmar e Ir a Sala</button>
                    </div>
                </div>
            );

            if (gameState === 'setup') return (
                <div className="min-h-screen bg-black flex flex-col p-6 items-center justify-center">
                    <div className="w-full max-w-4xl">
                        <header className="text-center mb-12">
                            <div className="text-5xl font-black mb-4 text-rose-500 monitor-font animate-pulse">00:{preArrivalTimer.toString().padStart(2,'0')}</div>
                            <h2 className="text-xl font-bold uppercase tracking-widest text-slate-400">Preparación de la Unidad</h2>
                            <p className="text-slate-600 text-sm">El recién nacido llegará pronto. ¡Ten todo listo!</p>
                        </header>

                        <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                            <button onClick={() => setSetupStatus({...setupStatus, heat: !setupStatus.heat})} className={`setup-tool p-8 rounded-[3rem] border-4 bg-slate-900 flex flex-col items-center gap-4 ${setupStatus.heat ? 'active' : 'border-slate-800'}`}>
                                <div className={`w-12 h-12 rounded-full flex items-center justify-center ${setupStatus.heat ? 'bg-orange-500 shadow-orange-500/50 shadow-lg' : 'bg-slate-800'}`}>
                                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5"><path d="M12 2v4m0 12v4M4.93 4.93l2.83 2.83m8.48 8.48l2.83 2.83M2 12h4m12 0h4M4.93 19.07l2.83-2.83m8.48-8.48l2.83-2.83"/></svg>
                                </div>
                                <span className="text-xs font-black uppercase">Cuna Radiante</span>
                                <span className={`text-[10px] px-3 py-1 rounded-full ${setupStatus.heat ? 'bg-orange-500/20 text-orange-400' : 'bg-slate-800 text-slate-600'}`}>{setupStatus.heat ? 'ON - CALENTANDO' : 'OFF'}</span>
                            </button>

                            <div className={`setup-tool p-8 rounded-[3rem] border-4 bg-slate-900 flex flex-col items-center gap-4 ${setupStatus.blender > 21 ? 'active' : 'border-slate-800'}`}>
                                <div className="w-12 h-12 bg-blue-500 rounded-full flex items-center justify-center shadow-lg"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5"><path d="M20 7h-9m3 10H5M9 7v10m6-10v10"/></svg></div>
                                <span className="text-xs font-black uppercase">Mezclador FiO2</span>
                                <div className="w-full text-center">
                                    <span className="text-3xl font-black monitor-font text-blue-400 block mb-2">{setupStatus.blender}%</span>
                                    <input type="range" min="21" max="100" step="1" value={setupStatus.blender} onChange={(e)=>setSetupStatus({...setupStatus, blender: parseInt(e.target.value)})} className="w-full accent-blue-500"/>
                                </div>
                            </div>

                            <button onClick={() => setSetupStatus({...setupStatus, suction: !setupStatus.suction})} className={`setup-tool p-8 rounded-[3rem] border-4 bg-slate-900 flex flex-col items-center gap-4 ${setupStatus.suction ? 'active' : 'border-slate-800'}`}>
                                <div className={`w-12 h-12 rounded-full flex items-center justify-center ${setupStatus.suction ? 'bg-emerald-500 shadow-emerald-500/50 shadow-lg' : 'bg-slate-800'}`}><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5"><path d="M12 2v20m-7-5 7 5 7-5"/></svg></div>
                                <span className="text-xs font-black uppercase">Sistema Succión</span>
                                <span className={`text-[10px] px-3 py-1 rounded-full ${setupStatus.suction ? 'bg-emerald-500/20 text-emerald-400' : 'bg-slate-800 text-slate-600'}`}>{setupStatus.suction ? 'PRESIÓN LISTA' : 'OFF'}</span>
                            </button>
                        </div>

                        <div className="mt-12 text-center">
                            <button onClick={() => { setFio2(setupStatus.blender); setGameState('birth'); }} className="bg-slate-800 px-8 py-3 rounded-2xl text-[10px] font-black uppercase tracking-widest hover:bg-slate-700 transition-colors">Omitir espera y recibir RN</button>
                        </div>
                    </div>
                </div>
            );

            if (gameState === 'birth') return (
                <div className="min-h-screen flex flex-col items-center justify-center p-6">
                    <h2 className="text-3xl font-black mb-12 uppercase tracking-widest text-amber-500 text-center">3. Evaluación al Nacer</h2>
                    <div className="grid gap-4 w-full max-w-md">
                        {[
                            { id: 't', q: "¿Es de Término?", a: currentCase.eg >= 37 ? "Sí" : "No ("+currentCase.eg+" sem)" },
                            { id: 'to', q: "¿Buen Tono?", a: currentCase.tone },
                            { id: 'r', q: "¿Respira o Llora?", a: currentCase.cry }
                        ].map(it => (
                            <button key={it.id} onClick={() => !askedBirth.includes(it.id) && setAskedBirth(p => [...p, it.id])} className={`p-10 rounded-[3rem] border-2 transition-all relative overflow-hidden ${askedBirth.includes(it.id) ? 'border-amber-600 bg-amber-600/10 text-white shadow-xl scale-105' : 'border-slate-800 bg-slate-900 shadow-lg'}`}>
                                <p className="text-[10px] font-black text-amber-500 uppercase mb-2">{it.q}</p>
                                <p className={`text-3xl font-black transition-all ${askedBirth.includes(it.id) ? 'opacity-100' : 'opacity-0'}`}>{it.a}</p>
                                {!askedBirth.includes(it.id) && <div className="absolute inset-0 flex items-center justify-center bg-slate-900/80 backdrop-blur-sm text-[10px] font-black text-slate-300 uppercase tracking-widest">Evaluar</div>}
                            </button>
                        ))}
                    </div>
                    <button disabled={askedBirth.length < 3} onClick={() => { setGameState('resus'); }} className="mt-14 bg-rose-600 py-5 px-20 rounded-3xl font-black uppercase tracking-widest animate-pulse shadow-2xl active:scale-95 transition-all">Iniciar Maniobras</button>
                </div>
            );

            if (gameState === 'resus') return (
                <div className="min-h-screen p-4 pb-64 flex flex-col xl:flex-row gap-6 max-w-7xl mx-auto">
                    {/* PANEL IZQUIERDO */}
                    <div className="flex-1 flex flex-col gap-6 relative">
                        <div className={`bg-black border-4 rounded-[2.5rem] p-6 shadow-2xl relative transition-all ${timer >= 60 && vitals.hr < 100 ? 'border-rose-600 pulse-red' : 'border-slate-800'}`}>
                            <div className="flex justify-between items-center mb-6">
                                <span className="text-[10px] font-black text-slate-600 uppercase tracking-widest italic">Real-Time Monitor v5.0</span>
                                <span className="text-amber-500 font-bold monitor-font text-lg tracking-widest">{formatTime(timer)}</span>
                            </div>
                            <div className="grid grid-cols-2 gap-8">
                                <div>
                                    <span className="text-[10px] font-bold text-emerald-500 uppercase">FC (BPM)</span>
                                    <div className="text-7xl font-black monitor-font text-emerald-400">{vitals.hr || '--'}</div>
                                    <WaveMonitor type="ecg" active={vitals.hr > 0} hr={vitals.hr} spo2={vitals.spo2} />
                                </div>
                                <div className="text-right">
                                    <span className="text-[10px] font-bold text-sky-500 uppercase">SpO2 (%)</span>
                                    <div className="text-7xl font-black monitor-font text-sky-400">{vitals.spo2 || '--'}</div>
                                    <WaveMonitor type="pleth" active={vitals.spo2 > 0} hr={vitals.hr} spo2={vitals.spo2} />
                                </div>
                            </div>
                        </div>

                        <div className="bg-slate-900 p-6 rounded-[2.5rem] border border-slate-800 shadow-xl">
                            <div className="flex justify-between items-center mb-6">
                                <span className="text-[10px] font-black text-blue-400 uppercase tracking-widest">Soporte y Ajustes</span>
                                <div className="flex gap-2">
                                    {['neopuff', 'ambu', 'freeflow'].map(m => (
                                        <button key={m} disabled={!selectedEquip.includes(m === 'freeflow' ? 'neopuff' : m)} onClick={() => {setMode(m); setIsMaskSealed(false);}} className={`px-3 py-1 rounded-xl text-[9px] font-black uppercase transition-all ${mode === m ? 'bg-blue-600 shadow-md shadow-blue-500/30' : 'bg-slate-800 text-slate-500 opacity-50'}`}>{m}</button>
                                    ))}
                                </div>
                            </div>
                            <div className="space-y-6">
                                <div><div className="flex justify-between text-[10px] font-bold text-slate-500 mb-1 uppercase tracking-tighter"><span>PIP (Presión Peak)</span><span className="text-blue-400 font-black">{pip}</span></div><input type="range" min="15" max="40" value={pip} onChange={(e)=>setPip(parseInt(e.target.value))}/></div>
                                <div><div className="flex justify-between text-[10px] font-bold text-slate-500 mb-1 uppercase tracking-tighter"><span>FiO2 (%)</span><span className="text-sky-400 font-black">{fio2}%</span></div><input type="range" min="21" max="100" value={fio2} onChange={(e)=>setFio2(parseInt(e.target.value))}/></div>
                                <div><div className="flex justify-between text-[10px] font-bold text-slate-500 mb-1 uppercase tracking-tighter"><span>Flujo (L/min)</span><span className={flow < 10 && mode === 'neopuff' ? 'text-rose-500 font-black' : 'text-emerald-500 font-black'}>{flow} L</span></div><input type="range" min="0" max="15" value={flow} onChange={(e)=>setFlow(parseInt(e.target.value))}/></div>
                            </div>
                        </div>

                        <div className="grid grid-cols-2 gap-2">
                            <div className="col-span-2 grid grid-cols-4 gap-1 mb-2 bg-slate-950 p-2 rounded-2xl border border-slate-800">
                                {selectedEquip.includes('bolsa_poli') && <button onClick={() => registerAction('thermal', 'bolsa_poli')} className="text-[8px] p-2 rounded-xl font-black uppercase border border-slate-700 hover:bg-slate-800">Bolsa Poli</button>}
                                {selectedEquip.includes('gorro') && <button onClick={() => registerAction('thermal', 'gorro')} className="text-[8px] p-2 rounded-xl font-black uppercase border border-slate-700 hover:bg-slate-800">Gorro</button>}
                                <button onClick={() => registerAction('thermal', 'secar')} className="text-[8px] p-2 rounded-xl font-black uppercase border border-slate-700 hover:bg-slate-800">Secar</button>
                                <button onClick={() => registerAction('thermal', 'posicionar')} className="text-[8px] p-2 rounded-xl font-black uppercase border border-slate-700 hover:bg-slate-800">Olfateo</button>
                            </div>
                            <button onClick={() => setProcModal('mrsopa')} className="bg-amber-600/20 border border-amber-600 text-amber-500 font-black p-5 rounded-3xl text-[10px] uppercase shadow-lg tracking-widest text-center hover:bg-amber-600/30 transition-colors">MR. SOPA</button>
                            <button onClick={() => setProcModal('advanced')} className="bg-slate-900 border border-slate-700 text-white font-black p-5 rounded-3xl text-[10px] uppercase shadow-lg tracking-widest text-center hover:bg-slate-800 transition-colors">Vía Aérea</button>
                        </div>
                    </div>

                    {/* PANEL DERECHO */}
                    <div className="flex-1 flex flex-col gap-6">
                        <div className="flex flex-col md:flex-row items-center justify-center gap-10 py-6 relative bg-slate-950/50 rounded-3xl border border-slate-800/50 h-full">
                            
                            <div className="relative flex flex-col items-center gap-4">
                                {mode !== 'freeflow' && mode !== 'apagado' && (
                                    <button onClick={() => { setIsMaskSealed(!isMaskSealed); addLog(isMaskSealed ? "Mascarilla retirada." : "Mascarilla sellada (PEEP activo).", isMaskSealed ? "info" : "correct"); }} 
                                        className={`px-4 py-2 rounded-full text-[9px] font-black uppercase tracking-widest transition-all ${isMaskSealed ? 'bg-emerald-600 text-white shadow-lg shadow-emerald-600/30' : 'bg-slate-800 text-slate-400 border border-slate-700 hover:bg-slate-700'}`}>
                                        {isMaskSealed ? 'Mascarilla Sellada ✓' : 'Sellar Mascarilla'}
                                    </button>
                                )}

                                <div className="relative">
                                    <div className={`absolute -top-12 left-1/2 -translate-x-1/2 bg-blue-600 text-white px-6 py-2 rounded-2xl text-sm font-black transition-all shadow-xl z-10 whitespace-nowrap ${rhythmMsg ? 'opacity-100 scale-100' : 'opacity-0 scale-50'}`}>{rhythmMsg}</div>
                                    
                                    {mode !== 'freeflow' ? (
                                        <button onMouseDown={handleVentilation} className={`w-40 h-40 rounded-full border-8 transition-all flex flex-col items-center justify-center ${isVPPActive ? 'bg-blue-600 scale-95 border-white shadow-inner' : 'bg-slate-900 border-blue-600 shadow-2xl shadow-blue-500/30'} ${!isMaskSealed && 'opacity-50 grayscale cursor-not-allowed'}`}>
                                            <svg className={`w-14 h-14 ${isVPPActive ? 'text-white' : 'text-blue-500'}`} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><circle cx="12" cy="12" r="4"/><path d="M12 2v20M2 12h20"/></svg>
                                        </button>
                                    ) : (
                                        <div className="w-40 h-40 rounded-full border-8 border-slate-800 bg-slate-900/50 flex items-center justify-center text-[10px] text-slate-600 font-black uppercase text-center p-8 italic leading-tight shadow-inner">O2 Flujo Libre<br/>(A Distancia)</div>
                                    )}
                                </div>
                            </div>

                            {/* MANÓMETRO */}
                            <div className="flex flex-col items-center justify-center p-4 bg-slate-900 border border-slate-800 rounded-3xl w-36 h-36 relative shadow-inner">
                                <div className="w-28 h-28 border-4 border-slate-700 rounded-full flex items-center justify-center bg-slate-950 relative shadow-2xl">
                                    <div className="absolute w-1 h-12 bg-blue-500 origin-bottom transition-transform duration-150 shadow-lg" 
                                         style={{ transform: `rotate(${isVPPActive ? (pip * 6 - 90) : (isMaskSealed ? (5 * 6 - 90) : -90)}deg)`, bottom: '50%' }}></div>
                                    <div className="w-2 h-2 bg-white rounded-full z-10"></div>
                                    <div className="absolute top-1 text-[7px] font-bold text-slate-500">40</div>
                                    <div className="absolute right-1 text-[7px] font-bold text-slate-500">20</div>
                                    <div className="absolute left-1 text-[7px] font-bold text-slate-500">0</div>
                                    <div className="absolute bottom-4 right-3 text-[5px] font-black text-emerald-500">PEEP</div>
                                </div>
                                <span className="text-[7px] font-black text-slate-500 mt-2 uppercase tracking-widest text-center leading-none">Presión cmH2O</span>
                            </div>
                        </div>

                        <div className="flex gap-4 w-full">
                            <button onClick={() => registerAction('drug', 'surfactante')} disabled={!selectedEquip.includes('surfactante')} className="flex-1 bg-violet-700 hover:bg-violet-600 py-5 rounded-[2rem] font-black text-[10px] md:text-xs uppercase shadow-xl disabled:opacity-30 tracking-widest transition-all">Surfactante</button>
                            <button onClick={() => registerAction('drug', 'adrenalina')} disabled={!selectedEquip.includes('adrenalina')} className="flex-1 bg-rose-700 hover:bg-rose-600 py-5 rounded-[2rem] font-black text-[10px] md:text-xs uppercase shadow-xl disabled:opacity-30 tracking-widest transition-all">Adrenalina</button>
                        </div>
                    </div>

                    {/* LOG PANEL */}
                    <div className="fixed bottom-0 left-0 right-0 p-5 bg-slate-950 border-t border-slate-800 h-56 overflow-y-auto z-40 shadow-[0_-10px_20px_rgba(0,0,0,0.5)]">
                        <div className="flex justify-between items-center mb-4 border-b border-white/5 pb-2 text-[10px] font-black text-slate-500 uppercase tracking-widest">
                            <span className="underline">Registro Asistente</span>
                            <span className="text-amber-500 tracking-widest">AHA RELOJ: {formatTime(timer)}</span>
                        </div>
                        {logs.length === 0 && <div className="text-[11px] text-slate-800 italic mt-4 text-center">Esperando conducta médica...</div>}
                        {logs.map((l, i) => (
                            <div key={i} className={`text-[11px] font-mono mb-2 flex gap-3 items-start py-2 px-3 rounded-xl border border-white/5 bg-white/5 ${l.status === 'alert' ? 'bg-amber-500/10 border-amber-500/30 animate-pulse' : ''}`}>
                                <span className="text-slate-600 shrink-0">[{l.t}]</span>
                                <span>{l.icon}</span>
                                <span className={l.status === 'error' ? 'text-rose-400 font-bold' : l.status === 'alert' ? 'text-amber-400 font-bold' : 'text-slate-200'}>{l.m}</span>
                            </div>
                        ))}
                    </div>

                    {/* MODALES */}
                    {procModal === 'mrsopa' && (
                        <div className="fixed inset-0 z-[100] bg-black/95 backdrop-blur-md flex items-center justify-center p-6 text-slate-900">
                            <div className="bg-white rounded-[3rem] p-10 max-w-xl w-full shadow-2xl">
                                <h3 className="text-2xl font-black mb-8 uppercase text-center tracking-widest">Correctivos: MR. SOPA</h3>
                                <div className="space-y-3">
                                    {[
                                        {id:'M', n:'Máscara', d:'Ajustar sello facial.'}, {id:'R', n:'Reposición', d:'Posición de olfateo.'},
                                        {id:'S', n:'Succión', d:'Boca y luego nariz.'}, {id:'O', n:'Open (Boca Abierta)', d:'Levantar mandíbula.'},
                                        {id:'P', n:'Presión', d:'Aumentar PIP gradualmente a 25-30.'}
                                    ].map(it => (
                                        <button key={it.id} onClick={() => { registerAction('sopa', it.id); }} className={`flex items-center gap-4 w-full p-4 rounded-3xl border-2 transition-all active:scale-95 ${stateRef.current.sopaSteps.includes(it.id) ? 'bg-emerald-50 border-emerald-500 shadow-inner' : 'bg-slate-50 border-slate-100 hover:bg-slate-100 shadow-md'}`}>
                                            <span className={`w-12 h-12 rounded-2xl flex items-center justify-center font-black text-xl transition-colors duration-300 ${stateRef.current.sopaSteps.includes(it.id) ? 'bg-emerald-500 text-white shadow-lg' : 'bg-slate-200 text-slate-500'}`}>{it.id}</span>
                                            <div className="text-left"><p className="text-sm font-bold text-slate-900 leading-none mb-1">{it.n}</p><p className="text-[10px] text-slate-400 leading-tight">{it.d}</p></div>
                                        </button>
                                    ))}
                                </div>
                                <button onClick={() => setProcModal(null)} className="w-full mt-10 bg-slate-900 text-white py-5 rounded-3xl font-black uppercase tracking-widest shadow-xl hover:bg-slate-800 transition-colors">Cerrar y Re-evaluar VPP</button>
                            </div>
                        </div>
                    )}

                    {procModal === 'advanced' && (
                        <div className="fixed inset-0 z-[100] bg-black/95 flex items-center justify-center p-6 text-slate-100">
                            <div className="bg-slate-900 p-10 rounded-[3rem] border border-slate-800 max-w-2xl w-full shadow-2xl">
                                <div className="flex justify-between items-center mb-10">
                                    <h3 className="text-2xl font-black uppercase tracking-widest text-blue-400">Vía Aérea Avanzada</h3>
                                    <button onClick={()=>setProcModal(null)} className="text-rose-500 font-bold uppercase text-xs hover:text-rose-400">Cerrar</button>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-8 text-left">
                                    <div className="space-y-4">
                                        <p className="text-[10px] font-black text-blue-500 uppercase border-b border-blue-900/50 pb-2 tracking-widest">Opción A: Intubación ET</p>
                                        <button disabled={!selectedEquip.includes('laringo')} onClick={() => addLog("Visualizo glotis con laringoscopio.", "correct")} className="w-full p-4 bg-slate-800 rounded-2xl text-[10px] font-bold uppercase hover:bg-blue-600 disabled:opacity-30 shadow-lg">1. Colocar Laringo</button>
                                        <div className="flex gap-2">
                                            {['tubo_25', 'tubo_30', 'tubo_35'].map(t => (
                                                <button key={t} disabled={!selectedEquip.includes(t)} onClick={() => { registerAction('sopa', 'A'); addLog(`Tubo ${t.split('_')[1]} insertado.`, "correct"); }} className="flex-1 p-3 bg-slate-800 rounded-xl text-[9px] font-bold uppercase hover:bg-blue-600 disabled:opacity-30">T.{t.split('_')[1]}</button>
                                            ))}
                                        </div>
                                        <button onClick={() => addLog("Tubo fijado y verificado.", "correct")} className="w-full p-4 bg-slate-800 rounded-2xl text-[10px] font-bold uppercase hover:bg-blue-600 shadow-lg">3. Fijar Tubo</button>
                                    </div>
                                    <div className="space-y-4">
                                        <p className="text-[10px] font-black text-amber-500 uppercase border-b border-amber-900/50 pb-2 tracking-widest">Opción B: Máscara Laríngea</p>
                                        <button disabled={!selectedEquip.includes('ml')} onClick={() => { registerAction('sopa', 'A'); addLog("Máscara Laríngea insertada y sellada.", "correct"); }} className="w-full p-4 bg-slate-800 rounded-2xl text-[10px] font-bold uppercase hover:bg-amber-600 disabled:opacity-30 shadow-lg">Insertar M. Laríngea</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );

            if (gameState === 'fail') return (
                <div className="min-h-screen flex items-center justify-center p-8 text-center bg-slate-950">
                    <div className="bg-slate-900 p-12 rounded-[4rem] border-4 border-rose-600 max-w-lg w-full shadow-2xl shadow-rose-900/20">
                        <h2 className="text-4xl font-black mb-6 uppercase text-rose-500 tracking-tighter">Muerte Neonatal</h2>
                        <p className="text-slate-400 mb-10 leading-relaxed text-lg italic tracking-tight">"A pesar de las maniobras, el paciente no respondió. En prematuros menores de 32 semanas, la termorregulación es vital (NO SECAR, usar bolsa poli)."</p>
                        <button onClick={() => setGameState('menu')} className="w-full bg-blue-600 py-6 rounded-3xl font-black uppercase tracking-widest shadow-xl">Reintentar</button>
                    </div>
                </div>
            );

            if (gameState === 'success') return (
                <div className="min-h-screen flex items-center justify-center p-8 text-center bg-slate-950">
                    <div className="bg-slate-900 p-12 rounded-[4rem] border-4 border-emerald-600 max-w-lg w-full shadow-2xl">
                        <h2 className="text-4xl font-black mb-6 uppercase text-emerald-500 tracking-tighter">Estabilizado</h2>
                        <p className="text-slate-400 mb-10 leading-relaxed text-lg tracking-tight">"RN con estabilidad hemodinámica. Se coordina el traslado inmediato a la UCIN."</p>
                        <button onClick={() => setGameState('menu')} className="w-full bg-blue-600 py-6 rounded-3xl font-black uppercase tracking-widest shadow-xl shadow-blue-900/20">Finalizar Guardia</button>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
